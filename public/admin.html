<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>解答綁定後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
    .btn-black { background: #000; color: #fff; transition: 0.2s; }
    .btn-black:hover { opacity: 0.8; transform: translateY(-1px); }
  </style>
</head>
<body class="p-4">

  <div class="glass w-full max-w-5xl p-10 grid grid-cols-1 md:grid-cols-2 gap-10">
    
    <section>
      <h2 class="text-xl font-bold mb-6 flex justify-between">
        雲端解答清單
        <button onclick="fetchFiles()" class="text-xs text-blue-600 font-bold">重新掃描</button>
      </h2>
      <div id="gasList" class="space-y-2 h-[400px] overflow-y-auto pr-2">
        <p class="text-slate-400">請輸入 GAS 網址並點擊掃描...</p>
      </div>
    </section>

    <section class="flex flex-col">
      <h2 class="text-xl font-bold mb-6">綁定設定</h2>
      <div class="space-y-6 flex-1">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase mb-2">所屬科目</label>
          <select id="subject" class="w-full p-4 rounded-xl bg-white border-none outline-none focus:ring-2 focus:ring-blue-400">
            <option value="國文">國文</option><option value="英文">英文</option>
            <option value="數學">數學</option><option value="社會">社會</option>
            <option value="自然">自然</option><option value="其他">其他</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-2">解答標題</label>
          <input type="text" id="title" class="w-full p-4 rounded-xl bg-white border-none outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-2">解答連結</label>
          <input type="url" id="url" readonly class="w-full p-4 rounded-xl bg-slate-100 text-slate-400 border-none outline-none text-sm">
        </div>
        <button id="saveBtn" onclick="saveToFirebase()" class="w-full btn-black py-5 rounded-2xl font-bold shadow-lg">確認寫入資料庫</button>
        <div id="status" class="text-center font-bold text-sm"></div>
      </div>
    </section>
  </div>

  <script>
    // ⚠️ 請填入你的 GAS 網頁應用程式網址
    var GAS_URL = "https://script.google.com/macros/s/AKfycbygibovMu_M60vb67idUpFTibjBGSQknsm6XOyx-_wY7WXZGfDMeKuopLjfdysVEAuS/exec";

    function fetchFiles() {
      var list = document.getElementById('gasList');
      list.innerHTML = "掃描中...";
      fetch(GAS_URL).then(function(res){ return res.json(); }).then(function(data){
        list.innerHTML = data.files.map(function(f){
          return `
            <div class="p-4 bg-white/50 rounded-xl mb-2 flex justify-between items-center border border-transparent hover:border-blue-300 cursor-pointer transition-all" onclick="selectFile('${f.name}','${f.url}')">
              <span class="text-sm font-bold truncate pr-4">${f.name}</span>
              <span class="text-[10px] bg-black text-white px-2 py-1 rounded">選取</span>
            </div>
          `;
        }).join('');
      });
    }

    function selectFile(name, url) {
      document.getElementById('title').value = name;
      document.getElementById('url').value = url;
    }

    function saveToFirebase() {
      var subject = document.getElementById('subject').value;
      var title = document.getElementById('title').value;
      var url = document.getElementById('url').value;
      var btn = document.getElementById('saveBtn');
      var status = document.getElementById('status');

      if (!title || !url) return alert('請先選取檔案');

      btn.innerText = "寫入中..."; btn.disabled = true;

      fetch('/api/bind-answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subject: subject, title: title, url: url })
      })
      .then(function(res){ return res.json(); })
      .then(function(data){
        if (data.success) {
          status.innerText = "✅ 寫入成功！";
          status.className = "text-center font-bold text-sm text-green-600";
          document.getElementById('title').value = "";
          document.getElementById('url').value = "";
        } else {
          status.innerText = "❌ 寫入失敗：" + data.message;
          status.className = "text-center font-bold text-sm text-red-600";
        }
      })
      .catch(function(){ status.innerText = "❌ 連線 Vercel 失敗"; })
      .finally(function(){ btn.innerText = "確認寫入資料庫"; btn.disabled = false; });
    }

    if (!GAS_URL.includes("你的")) fetchFiles();
  </script>
</body>
</html>
