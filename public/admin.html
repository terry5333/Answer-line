<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>解答綁定管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
  </style>
</head>
<body class="p-6">

  <div class="glass-card p-10 rounded-3xl w-full max-w-md">
    <h1 class="text-2xl font-black text-slate-800 mb-2">雲端解答綁定</h1>
    <p class="text-slate-500 text-sm mb-8">設定完成後，圖文選單將自動產生該解答按鈕</p>

    <div class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-slate-400 mb-2">所屬科目</label>
        <select id="subject" class="w-full p-4 rounded-xl bg-white/60 border-none outline-none focus:ring-2 focus:ring-slate-300 transition-all font-medium text-slate-700">
          <option value="國文">國文</option>
          <option value="英文">英文</option>
          <option value="數學">數學</option>
          <option value="社會">社會</option>
          <option value="自然">自然</option>
          <option value="其他">其他</option>
        </select>
      </div>
      
      <div>
        <label class="block text-xs font-bold text-slate-400 mb-2">按鈕顯示名稱</label>
        <input type="text" id="title" placeholder="例如: 1-1 課後練習解答" class="w-full p-4 rounded-xl bg-white/60 border-none outline-none focus:ring-2 focus:ring-slate-300 transition-all font-medium">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-400 mb-2">Google Drive 檔案網址</label>
        <input type="url" id="url" placeholder="https://..." class="w-full p-4 rounded-xl bg-white/60 border-none outline-none focus:ring-2 focus:ring-slate-300 transition-all font-medium">
      </div>

      <button id="submitBtn" onclick="uploadAnswer()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition-all shadow-md mt-4">
        確認寫入資料庫
      </button>
    </div>
  </div>

  <script>
    function uploadAnswer() {
      var subject = document.getElementById('subject').value;
      var title = document.getElementById('title').value.trim();
      var url = document.getElementById('url').value.trim();
      var btn = document.getElementById('submitBtn');

      if (!title || !url) {
        alert('請填寫標題與網址');
        return;
      }

      btn.innerText = '上傳中...';
      btn.disabled = true;

      fetch('/api/bind-answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subject: subject, title: title, url: url })
      })
      .then(function(res) { 
        return res.json(); 
      })
      .then(function(data) {
        if (data.success) {
          alert('✅ 寫入成功！學生現在點擊圖文選單的「' + subject + '」就會跳出此解答按鈕。');
          document.getElementById('title').value = '';
          document.getElementById('url').value = '';
        } else {
          alert('上傳失敗：' + data.message);
        }
      })
      .catch(function(err) {
        alert('連線失敗，請檢查網路或 Vercel 狀態');
      })
      .finally(function() {
        btn.innerText = '確認寫入資料庫';
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
