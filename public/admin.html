<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartEdu | 系統中樞</title>
  
  <link rel="manifest" href="/manifest.json?v=8">
  <meta name="theme-color" content="#FAF8F4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SmartEdu">
  <link class="apple-touch-icon" href="/icon-192.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Instrument Sans"', 'sans-serif'], serif: ['Fraunces', 'serif'] },
          colors: {
            bgCream: '#FAF8F4', textMain: '#1A1209', textBody: '#4A3F30', textMuted: '#8C7D6B',
            accentTerra: '#D4654A', terraBg: '#FDF0EC', accentSaffron: '#E8913A', saffronBg: '#FEF4E8',
            accentSage: '#4A8B6F', sageBg: '#EDF5F1', accentCobalt: '#3A5FC4', cobaltBg: '#EDF1FB',
          }
        }
      }
    }
  </script>

  <style>
    body { background-color: #FAF8F4; color: #1A1209; min-height: 100vh; overflow-x: hidden; }
    .glass-card { background: rgba(255, 253, 249, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(237, 232, 224, 0.8); border-radius: 20px; box-shadow: 0 8px 32px rgba(26, 18, 9, 0.03); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .themed-input { background: #FFFFFF; border: 1px solid rgba(237, 232, 224, 0.8); color: #1A1209; transition: all 0.3s; border-radius: 12px; }
    .themed-input:focus { border-color: #D4654A; outline: none; box-shadow: 0 0 0 3px #FDF0EC; }
    .btn-primary { background: #1A1209; color: #FFFFFF; border-radius: 12px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26, 18, 9, 0.15); }
    .tab-btn { color: #8C7D6B; transition: all 0.3s; }
    .tab-btn.active { color: #3A5FC4; background: #EDF1FB; font-weight: 700; }
    .group-item-btn { transition: all 0.2s; }
    .group-item-btn.active { background: #1A1209 !important; color: #FFFFFF !important; }
    .fade-up { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #EDE8E0; border-radius: 10px; }
    #mainContent { opacity: 0; transition: opacity 0.4s ease; pointer-events: none; } #mainContent.ready { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body class="relative font-sans antialiased">

  <div id="mainContent" class="max-w-[1500px] mx-auto">
    
    <header class="px-8 py-10 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6 fade-up">
      <div>
        <div class="flex items-center gap-2 mb-2">
          <span class="bg-sageBg text-accentSage px-2.5 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-accentSage animate-pulse"></span> System Online</span>
        </div>
        <h1 class="font-serif italic text-4xl tracking-tight text-textMain">Smart Education</h1>
      </div>
      
      <div class="flex flex-wrap gap-2 bg-white/60 p-1.5 rounded-2xl border border-[rgba(237,232,224,0.8)] shadow-sm relative z-10">
        <button onclick="switchTab('tab-resource')" id="btn-resource" class="tab-btn active px-6 py-2.5 rounded-xl text-sm font-bold tracking-wide">資源發佈</button>
        <button onclick="switchTab('tab-student')" id="btn-student" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold tracking-wide">出缺席與戰情</button>
        <button onclick="switchTab('tab-group')" id="btn-group" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold tracking-wide">身分組管理</button>
        <button onclick="logout()" class="px-4 py-2.5 rounded-xl text-textMuted hover:text-accentTerra transition-colors"><i data-lucide="log-out" class="w-4 h-4"></i></button>
      </div>
    </header>

    <main class="px-8 pb-20">
      
      <div id="tab-resource" class="grid grid-cols-1 lg:grid-cols-12 gap-6 fade-up">
        <div class="lg:col-span-7 flex flex-col gap-6">
          <div class="glass-card p-8 flex flex-col min-h-[540px] relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
              <h2 class="font-serif italic text-2xl text-textMain">Drive Resource</h2>
              <button onclick="fetchGasFiles()" class="text-xs bg-white border border-[#EDE8E0] px-4 py-2 rounded-xl font-bold hover:bg-gray-50 flex items-center gap-2"><i data-lucide="refresh-cw" class="w-3 h-3"></i>重新掃描</button>
            </div>
            <div id="gasList" class="space-y-2 overflow-y-auto pr-2 flex-1"><p class="text-center mt-20 text-sm font-semibold text-textMuted">讀取雲端檔案...</p></div>
          </div>
        </div>

        <div class="lg:col-span-5 flex flex-col gap-6">
          <div class="glass-card p-8">
            <h2 class="font-serif italic text-2xl mb-6">Publish Settings</h2>
            <div class="flex gap-2 mb-6 p-1 bg-gray-50 rounded-xl border border-[#EDE8E0]">
              <button id="btn-answers" onclick="setDataType('answers')" class="flex-1 py-3 bg-white shadow-sm rounded-lg font-bold text-sm text-textMain transition-all">解答庫</button>
              <button id="btn-textbooks" onclick="setDataType('textbooks')" class="flex-1 py-3 rounded-lg font-bold text-sm text-textMuted hover:text-textMain transition-all">課本庫</button>
            </div>
            <div class="space-y-4 mb-6">
              <input type="text" id="subject" class="themed-input w-full p-4 text-sm font-bold" placeholder="歸屬科目 (如: 國文)">
              <input type="text" id="title" class="themed-input w-full p-4 text-sm font-bold" placeholder="按鈕顯示標題">
              <div class="relative">
                <select id="publishGroup" class="themed-input w-full p-4 text-sm font-bold text-textBody appearance-none cursor-pointer">
                  <option value="全體">開放範圍：全體學生可見</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-textMuted"><i data-lucide="chevron-down" class="w-4 h-4"></i></div>
              </div>
              <input type="url" id="url" readonly class="w-full p-4 rounded-xl bg-gray-50 border border-dashed border-[#EDE8E0] text-textMuted text-xs font-mono outline-none" placeholder="雲端網址 (點擊左側自動帶入)">
            </div>
            <button id="submitBtn" onclick="bindFile()" class="w-full btn-primary py-4 text-sm font-bold tracking-wider uppercase">發佈至系統 Publish</button>
          </div>

          <div class="glass-card p-8 border-l-4 border-l-accentTerra flex flex-col min-h-[320px]">
            <div class="flex items-center gap-2 mb-6"><i data-lucide="sliders" class="w-5 h-5 text-accentTerra"></i><h2 class="font-serif italic text-xl text-textMain">已發佈資源維護</h2></div>
            <div class="grid grid-cols-2 gap-3 mb-4">
              <select id="delType" onchange="renderDelSelects()" class="themed-input p-3.5 text-xs font-bold"><option value="answers">解答庫</option><option value="textbooks">課本庫</option></select>
              <select id="delSubject" onchange="onSubjChange()" class="themed-input p-3.5 text-xs font-bold"><option value="">選擇科目...</option></select>
            </div>
            <div id="publishedItemsContainer" class="space-y-3 overflow-y-auto max-h-[220px] pr-1 flex-1">
              <p class="text-center text-xs text-textMuted py-8">請先選擇上方科目以管理現有解答...</p>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-student" class="hidden fade-up space-y-6">
        <div class="glass-card p-6 md:p-8 flex flex-col lg:flex-row justify-between items-center gap-6">
          <div class="flex flex-col md:flex-row gap-4 items-center w-full lg:w-auto flex-1">
            <h2 class="font-serif italic text-2xl mr-4 whitespace-nowrap">Student Roster</h2>
            <input type="text" id="newSeat" class="themed-input w-full md:w-32 p-3.5 text-sm font-mono font-bold" placeholder="座號">
            <input type="text" id="newName" class="themed-input w-full md:w-48 p-3.5 text-sm font-bold" placeholder="學生真實姓名">
            <button id="addStudentBtn" onclick="addStudent()" class="w-full md:w-auto btn-primary px-8 py-3.5 text-sm font-bold tracking-wide">建檔 Add</button>
          </div>
          <div class="flex gap-3 w-full lg:w-auto">
            <button onclick="clearAllLogs()" class="flex-1 lg:flex-none bg-terraBg text-accentTerra px-5 py-3 rounded-xl text-xs font-bold transition-all hover:scale-105 flex items-center justify-center gap-2"><i data-lucide="bomb" class="w-4 h-4"></i>清空紀錄</button>
            <button onclick="loadAllData()" class="flex-1 lg:flex-none bg-white border border-[#EDE8E0] px-5 py-3 rounded-xl text-xs font-bold transition-all hover:scale-105 flex items-center justify-center gap-2"><i data-lucide="refresh-ccw" class="w-4 h-4"></i>刷新戰情</button>
          </div>
        </div>
        <div id="studentCardsContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
      </div>

      <div id="tab-group" class="hidden fade-up">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
          
          <div class="lg:col-span-5 glass-card p-8">
            <div class="flex items-center gap-3 mb-6">
              <div class="p-2 bg-cobaltBg rounded-xl"><i data-lucide="users" class="w-5 h-5 text-accentCobalt"></i></div>
              <h2 class="font-serif italic text-xl text-textMain">身分組清單</h2>
            </div>
            <div class="flex gap-2 mb-6">
              <input type="text" id="newGroupNameInput" class="themed-input flex-1 p-3 text-xs font-bold" placeholder="新群組名稱 (如: 衝刺A班)">
              <button id="btnCreateGroup" onclick="createNewGroup()" class="btn-primary px-5 py-3 text-xs font-bold tracking-wide whitespace-nowrap">建立</button>
            </div>
            <div class="space-y-2 overflow-y-auto max-h-[400px] pr-1" id="groupListContainer"></div>
          </div>

          <div class="lg:col-span-7 glass-card p-8 min-h-[480px] flex flex-col">
            <div id="groupMembersHeader" class="border-b border-[#EDE8E0] pb-4 mb-4 flex justify-between items-center">
              <div>
                <h3 class="font-serif italic text-xl text-textMain" id="selectedGroupNameTitle">請選擇身分組</h3>
                <p class="text-[11px] text-textMuted mt-1">點擊左側身分組後，在此直接「勾選」或「取消」全班成員權限</p>
              </div>
              <span id="memberCountBadge" class="hidden bg-gray-100 text-textBody font-mono text-xs px-3 py-1 rounded-full font-bold"></span>
            </div>
            <div id="membersCheckboxContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-3 overflow-y-auto max-h-[420px] flex-1 pr-1">
              <div class="text-center font-semibold text-textMuted col-span-full py-20 italic">← 請先點擊左側任何一個身分組來配置成員</div>
            </div>
          </div>

        </div>
      </div>

    </main>
  </div>

  <script>
    let auth;
    
    // ⚠️ 請填寫您的真實管理員信箱與 GAS_URL 網址
    const ADMIN_WHITELIST = ['terrylie0215@gmail.com']; 
    var GAS_URL = "https://script.google.com/macros/s/AKfycbygibovMu_M60vb67idUpFTibjBGSQknsm6XOyx-_wY7WXZGfDMeKuopLjfdysVEAuS/exec"; 

    async function safeFetch(url, options = {}) {
      try {
        const res = await fetch(url, options);
        const text = await res.text();
        try {
          const data = JSON.parse(text);
          if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
          return data;
        } catch (e) {
          return { success: false, message: `伺服器異常 (${res.status})` };
        }
      } catch (err) {
        return { success: false, message: err.message };
      }
    }

    fetch('/api/config').then(res => res.json()).then(config => {
        if (!firebase.apps.length) firebase.initializeApp(config);
        auth = firebase.auth();
        auth.onAuthStateChanged(user => {
          if (!user) window.location.href = '/login.html';
          else if (!ADMIN_WHITELIST.includes(user.email)) { alert('⚠️ 無權檢視'); auth.signOut().then(() => { window.location.href = '/login.html'; }); } 
          else { document.getElementById('mainContent').classList.add('ready'); switchTab('tab-resource'); }
        });
    }).catch(err => { window.location.href = '/login.html'; });

    function logout() { if (auth) auth.signOut(); }
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js?v=' + Date.now()); }); }

    var currentDataType = 'answers';
    var boundUrls = new Set();
    var fbData = { answers: {}, textbooks: {} };
    var globalStudents = {};
    var globalLogs = [];
    var globalGroups = []; 
    var activeAdminGroup = ''; 

    function switchTab(tabId) {
      ['tab-resource', 'tab-student', 'tab-group'].forEach(id => {
        var el = document.getElementById(id);
        if(el) el.classList.add('hidden');
      });
      ['btn-resource', 'btn-student', 'btn-group'].forEach(id => {
        var el = document.getElementById(id);
        if(el) { el.classList.remove('active', 'bg-white', 'shadow-sm'); el.classList.add('text-textMuted'); }
      });
      var targetTab = document.getElementById(tabId);
      if(targetTab) targetTab.classList.remove('hidden');
      
      var btn = document.getElementById('btn-' + tabId.replace('tab-', ''));
      if(btn) btn.classList.add('active', 'bg-white', 'shadow-sm');
      
      if (tabId === 'tab-resource') { fetchGasFiles(); loadAllData(false); }
      if (tabId === 'tab-student') loadAllData(true);
      if (tabId === 'tab-group') loadAllData(true);
    }

    function setDataType(type) {
      currentDataType = type;
      var activeBtn = document.getElementById(type === 'answers' ? 'btn-answers' : 'btn-textbooks');
      var inactiveBtn = document.getElementById(type === 'answers' ? 'btn-textbooks' : 'btn-answers');
      activeBtn.className = 'flex-1 py-3 bg-white shadow-sm rounded-lg font-bold text-sm text-textMain transition-all';
      inactiveBtn.className = 'flex-1 py-3 rounded-lg font-bold text-sm text-textMuted hover:text-textMain transition-all';
    }

    function loadAllData(renderCards = true) {
      if(renderCards && globalGroups.length === 0) {
        document.getElementById('studentCardsContainer').innerHTML = '<div class="p-10 text-center font-semibold text-textMuted col-span-full">資料庫同步中...</div>';
      }
      
      return Promise.all([
        safeFetch('/api/admin-students?action=list'),
        safeFetch('/api/admin-logs'),
        safeFetch('/api/admin-groups')
      ]).then(function(results) {
        var stuRes = results[0], logRes = results[1], grpRes = results[2];

        globalStudents = stuRes.success ? (stuRes.students || {}) : {};
        globalLogs = logRes.success && logRes.logs ? (Array.isArray(logRes.logs) ? logRes.logs : Object.values(logRes.logs)) : [];
        globalGroups = grpRes.success && grpRes.groups ? Object.keys(grpRes.groups) : [];

        renderPublishGroupSelect(); 
        if(renderCards) {
          renderStudentCards(); 
          renderGroupList();    
          if(activeAdminGroup) selectGroupForMembers(activeAdminGroup); 
        }
      });
    }

    function fetchGasFiles() {
      var list = document.getElementById('gasList');
      if (!GAS_URL || GAS_URL.includes("YOUR_GAS_URL")) { list.innerHTML = "<p class='text-center mt-20 text-accentTerra font-bold'>請先配置 GAS_URL 變數</p>"; return; }
      
      safeFetch('/api/admin-answers?action=list').then(data => {
        if (data.success) { 
          fbData = data; boundUrls.clear(); 
          ['answers', 'textbooks'].forEach(t => { 
            if(data[t]) for(var s in data[t]) for(var k in data[t][s]) if(data[t][s][k].url) boundUrls.add(data[t][s][k].url); 
          }); 
          renderDelSelects(); 
        }
        return fetch(GAS_URL).catch(() => null);
      }).then(res => res ? res.json() : null).then(data => {
        if (!data || data.error) throw new Error(data ? data.error : "GAS API 異常");
        var html = '';
        data.forEach(f => { if (!boundUrls.has(f.url)) { html += `<div class="p-4 rounded-xl mb-3 cursor-pointer transition-all flex justify-between items-center bg-white border border-[#EDE8E0] hover:-translate-y-0.5 hover:shadow-sm" onclick="autoFill('${f.name}','${f.url}')"><span class="text-sm font-bold truncate pr-4 text-textMain">${f.name}</span><span class="text-[10px] px-3 py-1.5 rounded-lg font-bold bg-sageBg text-accentSage tracking-wide uppercase">Select</span></div>`; } });
        list.innerHTML = html || `<p class='text-center mt-16 font-bold text-textMuted'>檔案皆已發佈完畢 ✨</p>`;
      }).catch(err => {
        list.innerHTML = `<p class='text-center mt-10 text-accentTerra font-bold'>GAS 雲端硬碟連線失敗</p>`;
      });
    }

    function autoFill(n, u) { document.getElementById('title').value = n; document.getElementById('url').value = u; }
    
    function renderPublishGroupSelect() {
      var select = document.getElementById('publishGroup');
      select.innerHTML = '<option value="全體">開放範圍：全體學生可見</option>';
      globalGroups.forEach(g => { select.innerHTML += `<option value="${g}">特定權限：限【${g}】可見</option>`; });
    }

    function bindFile() {
      var s = document.getElementById('subject').value.trim(), t = document.getElementById('title').value.trim(), u = document.getElementById('url').value.trim(), g = document.getElementById('publishGroup').value;
      var btn = document.getElementById('submitBtn'); if (!s || !t || !u) return alert('請完整填寫發佈欄位');
      btn.innerText = '處理中...'; btn.disabled = true;
      safeFetch('/api/bind-answer', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: currentDataType, subject: s, title: t, url: u, group: g }) })
      .then(data => { if (data.success) { document.getElementById('title').value = ''; document.getElementById('url').value = ''; fetchGasFiles(); } else alert('失敗：' + data.message); }).finally(() => { btn.innerText = '發佈至系統 Publish'; btn.disabled = false; });
    }

    function renderDelSelects() {
      var t = document.getElementById('delType').value, sSelect = document.getElementById('delSubject');
      sSelect.innerHTML = '<option value="">選擇科目...</option>';
      if(fbData[t]) for (var s in fbData[t]) sSelect.innerHTML += `<option value="${s}">${s}</option>`;
      document.getElementById('publishedItemsContainer').innerHTML = '<p class="text-center text-xs text-textMuted py-8">請先選擇上方科目以管理現有解答...</p>';
    }
    
    function onSubjChange() {
      var t = document.getElementById('delType').value, s = document.getElementById('delSubject').value, container = document.getElementById('publishedItemsContainer');
      if (!s) { container.innerHTML = '<p class="text-center text-xs text-textMuted py-8">請先選擇上方科目以管理現有解答...</p>'; return; }
      
      var items = fbData[t][s] || {};
      var html = '';
      for (var key in items) {
        var item = items[key];
        var currentGroup = item.group || '全體';
        var optHtml = `<option value="全體" ${currentGroup==='全體'?'selected':''}>全體可見</option>`;
        globalGroups.forEach(g => { optHtml += `<option value="${g}" ${currentGroup===g?'selected':''}>限 ${g}</option>`; });

        html += `<div class="bg-white border border-[#EDE8E0] p-3 rounded-xl flex items-center justify-between gap-2 shadow-sm">
          <div class="min-w-0 flex-1"><p class="text-xs font-bold text-textMain truncate" title="${item.title}">${item.title}</p></div>
          <div class="flex items-center gap-2 shrink-0">
            <select onchange="updatePreviousAnswerGroup('${t}','${s}','${key}',this.value)" class="text-[10px] font-bold bg-gray-50 border border-[#EDE8E0] rounded p-1 outline-none text-textBody cursor-pointer">
              ${optHtml}
            </select>
            <button onclick="deletePublishedItem('${t}','${s}','${key}')" class="text-textMuted hover:text-accentTerra p-1 rounded transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
          </div>
        </div>`;
      }
      container.innerHTML = html || '<p class="text-center text-xs text-textMuted py-8">該科目下無任何發佈資源。</p>';
      lucide.createIcons();
    }

    function updatePreviousAnswerGroup(type, subject, key, newGroup) {
      safeFetch('/api/admin-answers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'updateGroup', type: type, subject: subject, key: key, group: newGroup })
      }).then(data => { if (!data.success) alert('變更身分組失敗'); });
    }

    function deletePublishedItem(type, subject, key) {
      if (!confirm('確定要將此資源從學生端下架刪除嗎？')) return;
      safeFetch('/api/admin-answers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete', type: type, subject: subject, key: key })
      }).then(data => { if (data.success) fetchGasFiles(); });
    }

    function renderStudentCards() {
      var container = document.getElementById('studentCardsContainer'), html = '', count = 0, logsBySeat = {};
      globalLogs.forEach(l => { if (l.seat && l.seat !== '未綁定') { if (!logsBySeat[l.seat]) logsBySeat[l.seat] = []; logsBySeat[l.seat].push(l); } });

      for (var seat in globalStudents) {
        var stu = globalStudents[seat]; 
        if (!stu) continue; // 防禦幽靈陣列
        count++;
        
        var isBound = !!stu.lineId, myLogs = logsBySeat[seat] || [];
        var avatarRender = stu.avatarUrl ? `<img src="${stu.avatarUrl}" onerror="this.style.display='none'; this.nextElementSibling.style.setProperty('display', 'flex', 'important');" class="w-full h-full object-cover rounded-full shadow-sm"><span class="hidden text-sm font-black text-textMuted w-full h-full items-center justify-center">${(stu.name || '未').charAt(0)}</span>` : `<span class="text-sm font-black text-textMuted">${(stu.name || '未').charAt(0)}</span>`;
        var statusBadge = isBound ? `<span class="px-2.5 py-1 rounded-lg text-[10px] font-bold tracking-widest uppercase bg-sageBg text-accentSage">已綁定</span>` : `<span class="px-2.5 py-1 rounded-lg text-[10px] font-bold tracking-widest uppercase bg-gray-100 text-textMuted">未綁定</span>`;
        var unbindBtn = isBound ? `<button onclick="unbindStudent('${seat}', '${stu.lineId}')" class="text-accentTerra hover:bg-terraBg p-1.5 rounded-lg transition-colors" title="解除綁定"><i data-lucide="unlink" class="w-4 h-4"></i></button>` : '';

        var studentGroups = stu.groups ? Object.keys(stu.groups) : [];
        var groupBadges = '';
        studentGroups.forEach(g => { groupBadges += `<span class="px-2 py-0.5 rounded bg-cobaltBg border border-accentCobalt text-accentCobalt text-[10px] font-bold shadow-sm">${g}</span>`; });
        if (studentGroups.length === 0) groupBadges = `<span class="text-[10px] text-textMuted italic">一般全體</span>`;

        var logHtml = '';
        if (myLogs.length > 0) {
          myLogs.forEach(function(l) {
            var shortTime = l.time && l.time.split(' ')[1] ? l.time.split(' ')[1].substring(0, 5) : l.time;
            logHtml += `<div class="flex items-center justify-between py-2.5 border-b border-[#EDE8E0] last:border-0 hover:bg-white/50 transition-colors px-1 group"><div class="flex items-center gap-3 min-w-0 flex-1"><span class="text-[10px] font-mono text-textMuted w-8">${shortTime}</span><div class="w-1 h-4 rounded-full ${l.type === '解答' ? 'bg-accentTerra' : 'bg-accentCobalt'}"></div><p class="text-xs font-bold truncate pr-2 text-textMain" title="${l.fileTitle}">${l.fileTitle}</p></div><button onclick="deleteSingleLog('${l.id}')" class="text-[#EDE8E0] group-hover:text-accentTerra text-xs px-2 transition-colors"><i data-lucide="x" class="w-3.5 h-3.5"></i></button></div>`;
          });
        } else { logHtml = `<div class="flex items-center justify-center h-full text-[11px] font-bold py-6 text-textMuted opacity-60">無足跡紀錄</div>`; }

        html += `
          <div class="glass-card flex flex-col h-[340px] overflow-hidden">
            <div class="p-6 border-b border-[#EDE8E0] bg-white/40 flex items-center justify-between">
              <div class="flex items-center gap-4 w-full">
                <div class="w-12 h-12 rounded-full border border-[#EDE8E0] bg-white flex items-center justify-center overflow-hidden shrink-0">${avatarRender}</div>
                <div class="min-w-0 flex-1">
                  <h3 class="font-bold text-lg text-textMain truncate">${stu.name || '未知'}</h3>
                  <div class="flex flex-wrap items-center gap-1.5 mt-1.5">
                    <p class="text-[11px] font-mono text-textMuted mr-1">${seat}</p>
                    ${groupBadges}
                  </div>
                </div>
              </div>
              <div class="flex flex-col items-end gap-2 shrink-0">${statusBadge}${unbindBtn}</div>
            </div>
            <div class="flex-1 p-5 overflow-y-auto">
              <div class="mb-4 pl-1 flex items-center gap-2"><i data-lucide="activity" class="w-3.5 h-3.5 text-accentSaffron"></i><h4 class="text-[10px] font-bold uppercase tracking-widest text-textMuted">Recent Activity</h4></div>
              ${logHtml}
            </div>
          </div>`;
      }
      container.innerHTML = count > 0 ? html : `<div class="p-10 text-center font-semibold text-textMuted col-span-full">目前無名單，請先建檔</div>`;
      lucide.createIcons();
    }

    function renderGroupList() {
      var list = document.getElementById('groupListContainer');
      if (globalGroups.length === 0) { list.innerHTML = '<p class="text-xs text-textMuted text-center py-6">請在上方建立第一個群組</p>'; return; }
      var html = '';
      globalGroups.forEach(g => {
        var activeClass = (g === activeAdminGroup) ? 'active' : '';
        html += `<div onclick="selectGroupForMembers('${g}')" data-group="${g}" class="group-item-btn ${activeClass} flex justify-between items-center bg-white border border-[#EDE8E0] p-3.5 rounded-xl shadow-sm cursor-pointer hover:bg-gray-50 transition-all">
                  <div class="flex items-center gap-3"><div class="w-2 h-2 rounded-full bg-accentCobalt"></div><span class="font-bold text-sm">${g}</span></div>
                  <button onclick="event.stopPropagation(); deleteGroup('${g}')" class="text-textMuted hover:text-accentTerra p-1.5 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                 </div>`;
      });
      list.innerHTML = html; lucide.createIcons();
    }

    // 🏆 【破解 Firebase 幽靈陣列陷阱】加入 if(!stu) return 攔截當機點！
    function selectGroupForMembers(groupName) {
      activeAdminGroup = groupName;
      document.querySelectorAll('.group-item-btn').forEach(btn => {
        if (btn.getAttribute('data-group') === groupName) btn.classList.add('active');
        else btn.classList.remove('active');
      });

      document.getElementById('selectedGroupNameTitle').innerText = `成員配置：限【${groupName}】`;
      var container = document.getElementById('membersCheckboxContainer');
      var html = ''; var memberCount = 0;
      var sortedSeats = Object.keys(globalStudents).sort();
      
      sortedSeats.forEach(seat => {
        var stu = globalStudents[seat];
        
        // 🔥 就是這裡！阻擋 Firebase 製造的幽靈 0 號空位導致當機！
        if (!stu) return; 
        
        var isMember = stu.groups && stu.groups[groupName] === true;
        if (isMember) memberCount++;
        html += `<label class="bg-white border border-[#EDE8E0] p-3 rounded-xl flex items-center gap-3 cursor-pointer select-none hover:bg-gray-50 transition-colors shadow-sm relative">
          <input type="checkbox" ${isMember ? 'checked' : ''} onchange="toggleStudentCheckbox('${seat}', '${groupName}', this.checked)" class="w-4 h-4 rounded text-accentCobalt focus:ring-accentCobalt border-gray-300 cursor-pointer">
          <div class="min-w-0"><span class="text-xs font-mono text-textMuted mr-1">[${seat}]</span><span class="text-sm font-bold text-textMain">${stu.name || '未知'}</span></div>
        </label>`;
      });

      container.innerHTML = html || '<p class="text-center text-xs text-textMuted col-span-full py-10">目前尚無學生註冊，請先前往戰情室建檔。</p>';
      var badge = document.getElementById('memberCountBadge');
      badge.innerText = `成員總數: ${memberCount} 人`; badge.classList.remove('hidden');
    }

    function toggleStudentCheckbox(seat, groupName, isChecked) {
      var action = isChecked ? 'assign' : 'unassign';
      if (!globalStudents[seat].groups) globalStudents[seat].groups = {};
      if (isChecked) globalStudents[seat].groups[groupName] = true;
      else delete globalStudents[seat].groups[groupName];
      
      safeFetch('/api/admin-groups', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: action, seat: seat, groupName: groupName })
      }).then(data => {
        if (!data.success) { alert('同步失敗，重新整理中'); loadAllData(); } 
        else {
          var count = 0; 
          for(var s in globalStudents) { 
            // 🔥 同步修復：計算人數時也防禦幽靈空位
            if(globalStudents[s] && globalStudents[s].groups && globalStudents[s].groups[groupName]) count++; 
          }
          document.getElementById('memberCountBadge').innerText = `成員總數: ${count} 人`;
        }
      });
    }

    function createNewGroup() {
      var name = document.getElementById('newGroupNameInput').value.trim();
      if (!name) return alert('請輸入身分組名稱');
      var btn = document.getElementById('btnCreateGroup'); btn.innerText = '..'; btn.disabled = true;
      
      safeFetch('/api/admin-groups', { 
        method: 'POST', 
        headers: {'Content-Type':'application/json'}, 
        body: JSON.stringify({action: 'add', groupName: name})
      })
      .then(data => { 
        if (data.success) { 
          document.getElementById('newGroupNameInput').value = ''; 
          activeAdminGroup = data.groupName || name; 
          loadAllData(); 
        } else {
          alert('建立失敗原因：' + (data.message || '未知錯誤'));
        }
      })
      .catch(err => alert('系統通訊崩崩，連線失敗：' + err.message))
      .finally(() => { btn.innerText = '建立'; btn.disabled = false; });
    }

    function deleteGroup(name) {
      if (!confirm(`確定要永久刪除 [${name}] 身分組嗎？`)) return;
      if (activeAdminGroup === name) activeAdminGroup = '';
      safeFetch('/api/admin-groups', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action: 'delete', groupName: name})})
      .then(data => { if (data.success) loadAllData(); });
    }

    function addStudent() { var s = document.getElementById('newSeat').value.trim(), n = document.getElementById('newName').value.trim(), btn = document.getElementById('addStudentBtn'); if (!s || !n) return alert('請填寫完整名單資訊'); btn.innerText = '..'; btn.disabled = true; safeFetch('/api/admin-students', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'add', seat: s, name: n }) }).then(data => { if (data.success) { document.getElementById('newSeat').value = ''; document.getElementById('newName').value = ''; loadAllData(); } }).finally(() => { btn.innerText = '建檔 Add'; btn.disabled = false; }); }
    function unbindStudent(s, l) { if (!confirm(`確定要強行解除座號 ${s} 的裝置綁定狀態嗎？`)) return; safeFetch('/api/admin-students', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'unbind', seat: s, lineId: l }) }).then(data => { if (data.success) loadAllData(); }); }
    function clearAllLogs() { if (!confirm("⚠️ 確定要永久刪除全班足跡紀錄嗎？")) return; safeFetch('/api/admin-logs', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'clearAll' }) }).then(data => { if (data.success) loadAllData(); }); }
    function deleteSingleLog(logId) { if (!confirm("確定要抹除本條點擊紀錄嗎？")) return; safeFetch('/api/admin-logs', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'clearSingle', logId: logId }) }).then(data => { if (data.success) loadAllData(); }); }
  </script>
</body>
</html>
