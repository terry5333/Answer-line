<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中樞控制台 | Smart Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #f1f5f9; min-height: 100vh; font-family: sans-serif; }
    .glass-panel { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); }
    .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid white; }
    .tab-btn.active { background-color: #0f172a; color: white; box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.1); }
    .type-btn.active { background: #1e293b; color: white; border-color: #1e293b; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-7xl mx-auto glass-panel rounded-[40px] shadow-2xl overflow-hidden border">
    
    <header class="p-6 md:p-8 border-b border-white flex flex-col md:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="text-3xl font-black text-slate-800 flex items-center gap-2">⚙️ Smart Education 中樞</h1>
      </div>
      
      <div class="flex bg-white/60 p-1.5 rounded-2xl border border-white shadow-inner overflow-x-auto">
        <button onclick="switchTab('tab-resource')" id="btn-resource" class="tab-btn active px-6 py-2.5 rounded-xl text-sm font-bold text-slate-600 transition flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-folder-open"></i> 資源管理
        </button>
        <button onclick="switchTab('tab-student')" id="btn-student" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold text-slate-600 transition flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-user-graduation"></i> 學生建檔
        </button>
        <button onclick="switchTab('tab-logs')" id="btn-logs" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold text-slate-600 transition flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-chart-line"></i> 軌跡紀錄
        </button>
      </div>
    </header>

    <main class="p-6 md:p-8 min-h-[600px]">
      
      <div id="tab-resource" class="block space-y-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
          <div class="lg:col-span-5 flex flex-col">
            <div class="glass-card rounded-3xl p-6 shadow-sm min-h-[450px] flex flex-col">
              <div class="flex justify-between items-center mb-6 pb-2 border-b border-slate-100">
                <h2 class="text-md font-black text-slate-700"><i class="fa-brand fa-google-drive text-blue-500 mr-2"></i>Drive 待處理區</h2>
                <button onclick="fetchGasFiles()" class="text-xs bg-white text-blue-600 px-3 py-1.5 rounded-xl font-bold border border-slate-200">重新掃描</button>
              </div>
              <div id="gasList" class="space-y-2 overflow-y-auto pr-1 flex-1">
                <p class="text-slate-400 text-center mt-20 text-sm">等候掃描中...</p>
              </div>
            </div>
          </div>

          <div class="lg:col-span-7 flex flex-col gap-6">
            <div class="glass-card rounded-3xl p-6 shadow-sm">
              <h2 class="text-md font-black text-slate-800 mb-5"><i class="fa-solid fa-circle-plus text-emerald-500 mr-2"></i>新增資源發佈</h2>
              <div class="flex gap-3 mb-6">
                <button id="btn-answers" onclick="setDataType('answers')" class="type-btn active flex-1 py-3 border border-slate-300 rounded-2xl font-bold text-sm">📝 解答專區</button>
                <button id="btn-textbooks" onclick="setDataType('textbooks')" class="type-btn flex-1 py-3 border border-slate-300 text-slate-500 rounded-2xl font-bold text-sm">📚 電子課本</button>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input type="text" id="subject" class="p-4 rounded-xl bg-white border border-slate-100 outline-none font-bold text-sm" placeholder="歸屬科目 (國文、歷史...)">
                <input type="text" id="title" class="p-4 rounded-xl bg-white border border-slate-100 outline-none font-bold text-sm" placeholder="按鈕顯示標題">
              </div>
              <input type="url" id="url" readonly class="w-full p-4 rounded-xl bg-slate-50 border border-slate-100 text-slate-400 text-xs font-mono mb-6" placeholder="點擊左側自動填入網址">
              <button id="submitBtn" onclick="bindFile()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl transition active:scale-95">確認同步至機器人</button>
            </div>

            <div class="bg-red-50/50 rounded-3xl p-6 border border-red-100">
              <h2 class="text-md font-black text-red-800 mb-4"><i class="fa-solid fa-trash-can mr-2"></i>下架管理</h2>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <select id="delType" onchange="renderDelSelects()" class="p-3.5 rounded-xl border border-red-100 font-bold text-sm bg-white text-red-900">
                  <option value="answers">📝 解答庫</option>
                  <option value="textbooks">📚 課本庫</option>
                </select>
                <select id="delSubject" onchange="onSubjChange()" class="p-3.5 rounded-xl border border-red-100 font-bold text-sm bg-white text-red-900">
                  <option value="">選擇科目...</option>
                </select>
              </div>
              <select id="delItem" class="w-full p-3.5 rounded-xl border border-red-100 font-medium text-sm bg-white text-red-900 mb-4">
                <option value="">選擇單一檔案 (留空則刪除整科)</option>
              </select>
              <button onclick="executeDelete()" class="w-full bg-red-600 text-white font-bold py-3.5 rounded-xl shadow-md">執行安全下架</button>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-student" class="hidden space-y-6">
        <div class="glass-card rounded-3xl p-6 shadow-sm">
          <h2 class="text-md font-black text-slate-800 mb-4">👤 新增學生預建檔</h2>
          <div class="flex flex-col md:flex-row gap-4 items-end">
            <div class="flex-1">
              <input type="text" id="newSeat" class="w-full p-3.5 rounded-xl border border-slate-100 font-bold" placeholder="座號 (例如: 30125)">
            </div>
            <div class="flex-1">
              <input type="text" id="newName" class="w-full p-3.5 rounded-xl border border-slate-100 font-bold" placeholder="學生真實姓名">
            </div>
            <button onclick="addStudent()" class="bg-blue-600 text-white font-bold px-10 py-3.5 rounded-xl shadow-lg active:scale-95 transition">確認建檔</button>
          </div>
        </div>

        <div class="glass-card rounded-3xl p-6 shadow-sm overflow-hidden">
          <h2 class="text-md font-black text-slate-800 mb-4">📋 學生認證清單</h2>
          <div class="overflow-x-auto rounded-2xl border border-slate-100">
            <table class="w-full text-left">
              <thead class="bg-slate-50 border-b">
                <tr>
                  <th class="p-4 text-xs font-bold text-slate-400">座號</th>
                  <th class="p-4 text-xs font-bold text-slate-400">姓名</th>
                  <th class="p-4 text-xs font-bold text-slate-400">認證狀態</th>
                  <th class="p-4 text-xs font-bold text-slate-400 text-right">操作</th>
                </tr>
              </thead>
              <tbody id="studentListContainer" class="text-sm divide-y">
                <tr><td colspan="4" class="p-8 text-center text-slate-400">載入中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="tab-logs" class="hidden space-y-4">
        <div class="glass-card rounded-3xl p-6 shadow-sm border">
          <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 pb-4 border-b">
            <h2 class="text-md font-black text-slate-800">🕵️ 學生點擊查詢軌跡</h2>
            <div class="flex gap-3">
              <select id="logFilter" onchange="renderLogs()" class="p-2.5 rounded-xl border font-bold text-sm bg-slate-50 outline-none">
                <option value="all">📊 全班總紀錄</option>
              </select>
              <button onclick="loadLogs()" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold active:scale-95 transition">刷新</button>
            </div>
          </div>
          <div class="overflow-x-auto rounded-2xl border border-slate-100">
            <table class="w-full text-left">
              <thead class="bg-slate-50 border-b text-xs text-slate-400 font-bold uppercase">
                <tr><th class="p-4">時間</th><th class="p-4">座號姓名</th><th class="p-4">類型</th><th class="p-4">內容</th></tr>
              </thead>
              <tbody id="logsContainer" class="text-sm divide-y"></tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script>
    // ⚠️ 老哥，你的 GAS 網址貼在下面這行引號裡！
    var GAS_URL = "https://script.google.com/macros/s/AKfycbxB_QrqsHTpyVjihAevLxkfNEMKqpL45WZ1o0veow5IbTMr5bpoFqMdGLdvkPPdqrfw8Q/exec"; 

    var currentDataType = 'answers';
    var boundUrls = new Set();
    var fbData = { answers: {}, textbooks: {} };
    var allLogs = [];

    function switchTab(tabId) {
      document.getElementById('tab-resource').classList.add('hidden');
      document.getElementById('tab-student').classList.add('hidden');
      document.getElementById('tab-logs').classList.add('hidden');
      document.getElementById('btn-resource').classList.remove('active');
      document.getElementById('btn-student').classList.remove('active');
      document.getElementById('btn-logs').classList.remove('active');
      document.getElementById(tabId).classList.remove('hidden');
      document.getElementById('btn-' + tabId.replace('tab-', '')).classList.add('active');
      if (tabId === 'tab-resource') fetchGasFiles();
      if (tabId === 'tab-student') loadStudents();
      if (tabId === 'tab-logs') loadLogs();
    }

    function setDataType(type) {
      currentDataType = type;
      document.getElementById('btn-answers').className = 'type-btn flex-1 py-3 border border-slate-300 rounded-2xl font-bold text-sm ' + (type === 'answers' ? 'active' : 'text-slate-500');
      document.getElementById('btn-textbooks').className = 'type-btn flex-1 py-3 border border-slate-300 rounded-2xl font-bold text-sm ' + (type === 'textbooks' ? 'active' : 'text-slate-500');
    }

    // --- 資源管理引擎 ---
    function fetchGasFiles() {
      var list = document.getElementById('gasList');
      if (!GAS_URL) { list.innerHTML = "請先貼上 GAS 網址"; return; }
      list.innerHTML = "掃描中...";
      
      fetch('/api/admin-answers?action=list').then(res => res.json()).then(data => {
        fbData = data; boundUrls.clear();
        ['answers', 'textbooks'].forEach(t => { for(var s in data[t]) for(var k in data[t][s]) boundUrls.add(data[t][s][k].url); });
        renderDelSelects();
        return fetch(GAS_URL);
      }).then(res => res.json()).then(data => {
        var html = '';
        data.forEach(f => {
          if (!boundUrls.has(f.url)) {
            html += `<div class="p-4 bg-white hover:bg-slate-50 rounded-2xl mb-2 cursor-pointer border border-slate-100 flex justify-between items-center group" onclick="autoFill('${f.name}','${f.url}')">
              <span class="text-sm font-bold text-slate-700 truncate pr-4">${f.name}</span>
              <span class="text-[10px] bg-slate-100 group-hover:bg-black group-hover:text-white px-2 py-1 rounded-lg font-bold">選取</span>
            </div>`;
          }
        });
        list.innerHTML = html || "暫無新檔案";
      }).catch(() => { list.innerHTML = "載入失敗"; });
    }

    function autoFill(n, u) { document.getElementById('title').value = n; document.getElementById('url').value = u; }

    function bindFile() {
      var s = document.getElementById('subject').value.trim();
      var t = document.getElementById('title').value.trim();
      var u = document.getElementById('url').value.trim();
      if (!s || !t || !u) return alert('必填！');
      fetch('/api/bind-answer', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: currentDataType, subject: s, title: t, url: u }) })
      .then(res => res.json()).then(data => { if (data.success) { alert('成功'); fetchGasFiles(); } });
    }

    function renderDelSelects() {
      var t = document.getElementById('delType').value;
      var sSelect = document.getElementById('delSubject');
      sSelect.innerHTML = '<option value="">選擇科目...</option>';
      for (var s in fbData[t]) sSelect.innerHTML += `<option value="${s}">${s}</option>`;
    }

    function onSubjChange() {
      var t = document.getElementById('delType').value;
      var s = document.getElementById('delSubject').value;
      var iSelect = document.getElementById('delItem');
      iSelect.innerHTML = '<option value="">單一檔案 (留空則全刪)</option>';
      if (!s) return;
      for (var k in fbData[t][s]) if (fbData[t][s][k].title) iSelect.innerHTML += `<option value="${k}">${fbData[t][s][k].title}</option>`;
    }

    function executeDelete() {
      var t = document.getElementById('delType').value, s = document.getElementById('delSubject').value, k = document.getElementById('delItem').value;
      if (!s) return alert('選科目');
      if (!confirm('刪除？')) return;
      fetch('/api/admin-answers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete', type: t, subject: s, key: k }) }).then(() => fetchGasFiles());
    }

    // --- 學生建檔引擎 ---
    function loadStudents() {
      fetch('/api/admin-students?action=list').then(res => res.json()).then(data => {
        var html = '';
        for (var seat in data.students) {
          var stu = data.students[seat], isB = !!stu.lineId;
          html += `<tr class="hover:bg-slate-50">
            <td class="p-4 font-bold font-mono">${seat}</td>
            <td class="p-4 font-black">${stu.name}</td>
            <td class="p-4">${isB ? '<span class="text-emerald-600 font-bold">已綁定</span>' : '<span class="text-slate-400">未綁定</span>'}</td>
            <td class="p-4 text-right">${isB ? `<button onclick="unbindStudent('${seat}', '${stu.lineId}')" class="text-red-500 text-xs font-bold">解除綁定</button>` : ''}</td>
          </tr>`;
        }
        document.getElementById('studentListContainer').innerHTML = html || '無資料';
      });
    }

    function addStudent() {
      var s = document.getElementById('newSeat').value.trim(), n = document.getElementById('newName').value.trim();
      if (!s || !n) return alert('必填');
      fetch('/api/admin-students', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'add', seat: s, name: n }) }).then(() => loadStudents());
    }

    function unbindStudent(s, l) {
      if (!confirm('解除？')) return;
      fetch('/api/admin-students', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'unbind', seat: s, lineId: l }) }).then(() => loadStudents());
    }

    // --- 軌跡紀錄引擎 ---
    function loadLogs() {
      fetch('/api/admin-logs').then(res => res.json()).then(data => {
        allLogs = data.logs;
        var filter = document.getElementById('logFilter'), uniqueS = new Set(), html = '<option value="all">📊 全班總紀錄</option>';
        allLogs.forEach(l => uniqueS.add(l.seat));
        Array.from(uniqueS).sort().forEach(s => html += `<option value="${s}">${s}</option>`);
        filter.innerHTML = html;
        renderLogs();
      });
    }

    function renderLogs() {
      var filter = document.getElementById('logFilter').value;
      var container = document.getElementById('logsContainer'), html = '';
      var filtered = filter === 'all' ? allLogs : allLogs.filter(l => l.seat === filter);
      filtered.forEach(l => {
        html += `<tr class="hover:bg-slate-50">
          <td class="p-4 text-xs text-slate-400 font-mono">${l.time}</td>
          <td class="p-4 font-bold">${l.seat} ${l.name}</td>
          <td class="p-4"><span class="bg-slate-100 px-2 py-0.5 rounded text-xs">${l.type}</span></td>
          <td class="p-4 font-bold">${l.subject}</td>
        </tr>`;
      });
      container.innerHTML = html || '無紀錄';
    }

    window.onload = () => switchTab('tab-resource');
  </script>
</body>
</html>
