<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雲端解答中樞系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 動態流光漸層背景 */
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(-45deg, #e2e8f0, #cbd5e1, #f8fafc, #eef2ff);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* 極致玻璃擬態 */
    .glass-panel {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.8);
      border-radius: 32px;
    }

    /* 雲端檔案懸停效果 */
    .file-item {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }
    .file-item:hover {
      background: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.05);
      border-color: #cbd5e1;
    }

    /* 自訂捲軸 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body>

  <div class="glass-panel w-full max-w-6xl p-8 md:p-12">
    
    <header class="mb-10 text-center md:text-left">
      <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight mb-3">解答數據綁定中樞</h1>
      <p class="text-slate-500 font-medium">從 Google Drive 讀取雲端檔案，並即時寫入 LINE 機器人資料庫</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
      
      <div class="lg:col-span-7 bg-white/30 rounded-3xl p-6 md:p-8 border border-white/50 shadow-sm">
        <div class="flex justify-between items-center mb-6 border-b border-white/50 pb-4">
          <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2">
            <i class="fa-brands fa-google-drive text-blue-500"></i> 雲端檔案清單
          </h2>
          <button onclick="fetchGasFiles()" class="text-sm font-bold bg-white text-blue-600 px-4 py-2 rounded-xl shadow-sm hover:shadow-md transition-all active:scale-95">
            <i class="fa-solid fa-rotate-right mr-1"></i> 重新掃描
          </button>
        </div>
        
        <div id="gasList" class="space-y-3 h-[450px] overflow-y-auto pr-2">
          <div class="flex flex-col items-center justify-center h-full text-slate-400">
            <i class="fa-solid fa-cloud-arrow-down text-4xl mb-3 opacity-50"></i>
            <p>正在等候讀取...</p>
          </div>
        </div>
      </div>

      <div class="lg:col-span-5 flex flex-col">
        <div class="bg-white/40 rounded-3xl p-6 md:p-8 border border-white/50 shadow-sm flex-1">
          <h2 class="text-lg font-bold text-slate-700 mb-6 flex items-center gap-2 border-b border-white/50 pb-4">
            <i class="fa-solid fa-link text-slate-800"></i> 參數設定與寫入
          </h2>
          
          <div class="space-y-6">
            <div>
              <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">1. 選擇歸屬科目</label>
              <div class="relative">
                <select id="subject" class="w-full p-4 rounded-2xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-blue-400 font-bold text-slate-700 appearance-none cursor-pointer">
                  <option value="國文">國文</option>
                  <option value="英文">英文</option>
                  <option value="數學">數學</option>
                  <option value="歷史">歷史</option>
                  <option value="地理">地理</option>
                  <option value="公民">公民</option>
                  <option value="其他">其他</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-5 text-slate-400 pointer-events-none"></i>
              </div>
            </div>
            
            <div>
              <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">2. 圖文按鈕顯示標題</label>
              <input type="text" id="title" placeholder="由左側選取自動帶入..." class="w-full p-4 rounded-2xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-blue-400 font-medium text-slate-800 transition-all shadow-inner">
            </div>

            <div>
              <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">3. 雲端網址</label>
              <input type="url" id="url" placeholder="https://..." readonly class="w-full p-4 rounded-2xl bg-slate-100 border border-slate-200 outline-none text-slate-400 text-sm overflow-hidden text-ellipsis">
            </div>

            <button id="submitBtn" onclick="bindAnswer()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-slate-800 hover:shadow-2xl transition-all active:scale-[0.98] mt-4 flex justify-center items-center gap-2">
              <i class="fa-solid fa-database"></i> 執行寫入任務
            </button>
            
            <div id="statusBox" class="mt-4 p-4 rounded-xl hidden text-sm font-bold text-center"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ⚠️ 填寫你的 GAS 網址
    var GAS_URL = "https://script.google.com/macros/s/AKfycbygibovMu_M60vb67idUpFTibjBGSQknsm6XOyx-_wY7WXZGfDMeKuopLjfdysVEAuS/exec";

    function fetchGasFiles() {
      var listContainer = document.getElementById('gasList');
      if (GAS_URL.includes("你的_GAS")) {
        listContainer.innerHTML = '<div class="text-center text-red-500 mt-10 font-bold"><i class="fa-solid fa-triangle-exclamation text-2xl mb-2"></i><br>請先在程式碼中設定 GAS_URL</div>';
        return;
      }

      listContainer.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-blue-500"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3"></i><p class="font-bold text-sm">掃描雲端硬碟中...</p></div>';

      fetch(GAS_URL)
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data && data.length > 0) {
            var html = data.map(function(f) {
              return `
                <div class="file-item p-4 rounded-2xl cursor-pointer flex justify-between items-center" 
                     onclick="autoFill('${f.name}', '${f.url}')">
                  <div class="flex items-center gap-3 overflow-hidden">
                    <i class="fa-regular fa-file-pdf text-red-400 text-xl flex-shrink-0"></i>
                    <span class="text-sm font-bold text-slate-700 truncate">${f.name}</span>
                  </div>
                  <span class="text-[10px] bg-slate-900 text-white px-3 py-1.5 rounded-lg font-bold flex-shrink-0">選擇</span>
                </div>
              `;
            }).join('');
            listContainer.innerHTML = html;
          } else {
            listContainer.innerHTML = '<div class="text-center text-slate-500 mt-10 font-bold">資料夾內沒有檔案</div>';
          }
        })
        .catch(function(err) {
          listContainer.innerHTML = '<div class="text-center text-red-500 mt-10 font-bold">GAS 連線失敗，請確認網址</div>';
        });
    }

    function autoFill(fileName, fileUrl) {
      document.getElementById('title').value = fileName;
      document.getElementById('url').value = fileUrl;
    }

    function bindAnswer() {
      var subject = document.getElementById('subject').value;
      var title = document.getElementById('title').value.trim();
      var url = document.getElementById('url').value.trim();
      var btn = document.getElementById('submitBtn');
      var statusBox = document.getElementById('statusBox');

      if (!title || !url) {
        statusBox.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> 請先從左側選取檔案';
        statusBox.className = "mt-4 p-4 rounded-xl text-sm font-bold text-center bg-red-50 text-red-600 border border-red-200 block";
        return;
      }

      btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 寫入中...';
      btn.disabled = true;
      statusBox.classList.add('hidden');

      fetch('/api/bind-answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subject: subject, title: title, url: url })
      })
      .then(function(res) { 
        return res.json(); 
      })
      .then(function(data) {
        if (data.success) {
          statusBox.innerHTML = '<i class="fa-solid fa-circle-check"></i> 寫入成功！資料庫已更新';
          statusBox.className = "mt-4 p-4 rounded-xl text-sm font-bold text-center bg-green-50 text-green-600 border border-green-200 block";
          document.getElementById('title').value = '';
          document.getElementById('url').value = '';
        } else {
          // 如果失敗，會把伺服器傳來的真正錯誤印出來！
          statusBox.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> 寫入失敗：<br>' + data.message;
          statusBox.className = "mt-4 p-4 rounded-xl text-sm font-bold text-center bg-red-50 text-red-600 border border-red-200 block";
        }
      })
      .catch(function(err) {
        statusBox.innerHTML = '<i class="fa-solid fa-wifi"></i> 網路連線錯誤，或 Vercel API 崩潰';
        statusBox.className = "mt-4 p-4 rounded-xl text-sm font-bold text-center bg-red-50 text-red-600 border border-red-200 block";
      })
      .finally(function() {
        btn.innerHTML = '<i class="fa-solid fa-database"></i> 執行寫入任務';
        btn.disabled = false;
      });
    }

    // 自動執行掃描
    window.onload = function() {
      if (!GAS_URL.includes("你的_GAS")) fetchGasFiles();
    };
  </script>
</body>
</html>
