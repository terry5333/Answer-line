<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教育管理系統後台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: #f3f4f6; display: flex; min-height: 100vh; color: #111; }
    
    /* 左側導覽列 */
    .sidebar { width: 250px; background-color: #111; color: #fff; padding: 30px 0; display: flex; flex-direction: column; }
    .logo { font-size: 20px; font-weight: 800; padding: 0 24px; margin-bottom: 40px; letter-spacing: 1px; }
    .nav-item { padding: 16px 24px; font-size: 15px; color: #9ca3af; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
    .nav-item:hover { background-color: #1f2937; color: #fff; }
    .nav-item.active { background-color: #1f2937; color: #fff; border-left-color: #3b82f6; font-weight: 600; }

    /* 右側主內容區 */
    .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
    .section { display: none; background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .section.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    h2 { font-size: 24px; font-weight: 800; margin-bottom: 24px; border-bottom: 2px solid #f3f4f6; padding-bottom: 12px; }

    /* 表單與按鈕 */
    .flex-row { display: flex; gap: 16px; margin-bottom: 20px; align-items: flex-end; }
    .form-group { flex-grow: 1; }
    label { display: block; font-size: 13px; font-weight: 700; color: #4b5563; margin-bottom: 8px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; outline: none; }
    input:focus { border-color: #111; }
    .btn { padding: 12px 24px; background: #111; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #374151; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-secondary:hover { background: #d1d5db; }

    /* 表格設計 */
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 16px; text-align: left; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
    th { background-color: #f9fafb; font-weight: 700; color: #4b5563; }
    tr:hover { background-color: #f9fafb; }
    .action-link { color: #3b82f6; cursor: pointer; margin-right: 12px; font-weight: 600; text-decoration: none; }

    /* 雲端檔案卡片 */
    .file-card { border: 1px solid #e5e7eb; padding: 16px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .file-name { font-weight: 600; font-size: 15px; }
    .file-date { font-size: 12px; color: #6b7280; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo">EDU ADMIN</div>
    <div class="nav-item active" onclick="switchTab('answers', this)">📁 解答管理</div>
    <div class="nav-item" onclick="switchTab('students', this)">🧑‍🎓 學生管理</div>
    <div class="nav-item" onclick="switchTab('reports', this)">📊 報表分析</div>
  </div>

  <div class="main-content">
    
    <div id="answers" class="section active">
      <h2>解答管理 (串接雲端硬碟)</h2>
      <div class="flex-row">
        <button class="btn btn-secondary" onclick="fetchDriveFiles()">從雲端硬碟抓取新檔案</button>
      </div>
      <div id="driveFilesContainer">
        <p style="color:#6b7280; font-size:14px;">請點擊上方按鈕抓取尚未綁定的解答檔案。</p>
      </div>
    </div>

    <div id="students" class="section">
      <h2>學生管理</h2>
      <div class="flex-row">
        <div class="form-group">
          <label>座號</label>
          <input type="text" id="newStuNo" placeholder="例：01">
        </div>
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="newStuName" placeholder="例：李泰睿">
        </div>
        <button class="btn" onclick="saveStudent()">新增 / 更新學生</button>
      </div>
      
      <table>
        <thead>
          <tr>
            <th>座號</th>
            <th>姓名</th>
            <th>綁定狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="studentTableBody">
          </tbody>
      </table>
    </div>

    <div id="reports" class="section">
      <h2>報表分析</h2>
      <p style="color:#6b7280;">數據儀表板建置中... 未來將顯示各科目的點擊率與學生學習狀況。</p>
    </div>

  </div>

  <script>
    // ⚠️ 貼上你剛才部署的 GAS Web App URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbygibovMu_M60vb67idUpFTibjBGSQknsm6XOyx-_wY7WXZGfDMeKuopLjfdysVEAuS/exec";

    // 頁籤切換邏輯
    function switchTab(tabId, el) {
      document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      el.classList.add('active');

      if(tabId === 'students') loadStudents();
    }

    // --- 解答管理邏輯 ---
    async function fetchDriveFiles() {
      const container = document.getElementById('driveFilesContainer');
      container.innerHTML = "抓取中...";
      try {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        if(data.success && data.files.length > 0) {
          container.innerHTML = data.files.map(f => `
            <div class="file-card">
              <div>
                <div class="file-name">${f.name}</div>
                <div class="file-date">建立於：${new Date(f.date).toLocaleString()}</div>
              </div>
              <button class="btn btn-secondary" onclick="window.open('${f.url}')">查看/綁定</button>
            </div>
          `).join('');
        } else {
          container.innerHTML = "目前沒有未綁定的檔案。";
        }
      } catch (err) {
        container.innerHTML = "抓取失敗，請確認 GAS 網址是否正確。";
      }
    }

    // --- 學生管理邏輯 ---
    async function loadStudents() {
      const tbody = document.getElementById('studentTableBody');
      tbody.innerHTML = "<tr><td colspan='4'>載入中...</td></tr>";
      try {
        const res = await fetch('/api/students');
        const result = await res.json();
        
        if (result.success && result.data) {
          const students = result.data;
          tbody.innerHTML = Object.keys(students).map(stuNo => `
            <tr>
              <td>${stuNo}</td>
              <td>${students[stuNo].name}</td>
              <td><span style="color: green;">已紀錄</span></td>
              <td>
                <span class="action-link" onclick="editStudent('${stuNo}', '${students[stuNo].name}')">編輯</span>
                <span class="action-link">查看紀錄</span>
              </td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = "<tr><td colspan='4'>目前無學生資料</td></tr>";
        }
      } catch (err) {
        tbody.innerHTML = "<tr><td colspan='4'>載入失敗</td></tr>";
      }
    }

    async function saveStudent() {
      const stuNo = document.getElementById('newStuNo').value.trim();
      const name = document.getElementById('newStuName').value.trim();
      if (!stuNo || !name) return alert("請輸入座號與姓名");

      try {
        const res = await fetch('/api/students', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ stuNo, name })
        });
        const result = await res.json();
        if (result.success) {
          alert("儲存成功！");
          document.getElementById('newStuNo').value = "";
          document.getElementById('newStuName').value = "";
          loadStudents(); // 重新載入列表
        } else alert("失敗：" + result.message);
      } catch (err) {
        alert("連線錯誤");
      }
    }

    function editStudent(stuNo, name) {
      document.getElementById('newStuNo').value = stuNo;
      document.getElementById('newStuName').value = name;
    }
  </script>
</body>
</html>
