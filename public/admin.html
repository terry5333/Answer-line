<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雲端中樞系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #f0f4f8; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
    .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,1); border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
    .type-btn.active { background: #0f172a; color: white; border-color: #0f172a; }
  </style>
</head>
<body>

  <div class="glass w-full max-w-6xl p-8 md:p-10 relative">
    
    <button onclick="fetchLineMenus()" class="absolute top-8 right-10 bg-green-100 text-green-700 font-bold px-4 py-2 rounded-xl text-sm hover:bg-green-200 transition">
      <i class="fa-brands fa-line"></i> 獲取 LINE 選單 ID
    </button>

    <header class="mb-10">
      <h1 class="text-3xl font-black text-slate-800 mb-2">檔案綁定中樞</h1>
      <p class="text-slate-500 font-medium">支援雙模式：解答上傳 / 課本上傳</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
      
      <div class="bg-white/50 rounded-3xl p-8 border border-slate-200">
        <h2 class="text-lg font-bold text-slate-700 mb-4 flex justify-between">
          <span><i class="fa-solid fa-cloud"></i> Google Drive 檔案</span>
          <button onclick="fetchGasFiles()" class="text-sm text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">重整</button>
        </h2>
        <div id="gasList" class="space-y-3 h-[400px] overflow-y-auto pr-2">
          <p class="text-slate-400 text-sm mt-10 text-center">掃描中...</p>
        </div>
      </div>

      <div class="flex flex-col">
        <div class="bg-white/60 rounded-3xl p-8 border border-slate-200 flex-1">
          
          <div class="flex gap-4 mb-8">
            <button id="btn-answers" onclick="setType('answers')" class="type-btn active flex-1 py-3 border border-slate-300 rounded-xl font-bold transition">📝 解答模式</button>
            <button id="btn-textbooks" onclick="setType('textbooks')" class="type-btn flex-1 py-3 border border-slate-300 text-slate-600 rounded-xl font-bold transition">📚 課本模式</button>
          </div>

          <div class="space-y-6">
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase mb-2">所屬科目</label>
              <select id="subject" class="w-full p-4 rounded-xl bg-white border border-slate-200 outline-none font-bold">
                <option value="國文">國文</option><option value="英文">英文</option>
                <option value="數學">數學</option><option value="歷史">歷史</option>
                <option value="地理">地理</option><option value="公民">公民</option><option value="其他">其他</option>
              </select>
            </div>
            
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase mb-2">圖文按鈕標題</label>
              <input type="text" id="title" class="w-full p-4 rounded-xl bg-white border border-slate-200 outline-none font-medium">
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase mb-2">檔案網址</label>
              <input type="url" id="url" readonly class="w-full p-4 rounded-xl bg-slate-100 border border-slate-200 text-slate-400 text-sm">
            </div>

            <button id="submitBtn" onclick="bindFile()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-xl shadow-xl hover:bg-slate-800 transition">
              <i class="fa-solid fa-cloud-arrow-up"></i> 確認上傳
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ 請填寫 GAS 網址 (務必確認結尾是 /exec)
    var GAS_URL = "https://script.google.com/macros/s/AKfycbygibovMu_M60vb67idUpFTibjBGSQknsm6XOyx-_wY7WXZGfDMeKuopLjfdysVEAuS/exec";
    var currentType = 'answers';

    function setType(type) {
      currentType = type;
      document.getElementById('btn-answers').classList.remove('active', 'text-white', 'bg-slate-900');
      document.getElementById('btn-answers').classList.add('text-slate-600');
      document.getElementById('btn-textbooks').classList.remove('active', 'text-white', 'bg-slate-900');
      document.getElementById('btn-textbooks').classList.add('text-slate-600');
      
      document.getElementById('btn-' + type).classList.add('active', 'text-white', 'bg-slate-900');
      document.getElementById('btn-' + type).classList.remove('text-slate-600');
    }

    function fetchGasFiles() {
      var list = document.getElementById('gasList');
      if(GAS_URL.includes("你的")) { list.innerHTML = "<p class='text-red-500 text-center font-bold mt-10'>請先填寫 GAS 網址</p>"; return; }

      fetch(GAS_URL)
        .then(function(res){ return res.json(); })
        .then(function(data){
          if(data && data.length > 0) {
            list.innerHTML = data.map(function(f){
              return `<div class="p-4 bg-white rounded-xl mb-2 cursor-pointer border border-transparent hover:border-blue-400 shadow-sm flex justify-between items-center transition" onclick="autoFill('${f.name}','${f.url}')">
                        <span class="text-sm font-bold text-slate-700 truncate pr-4">${f.name}</span>
                        <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded">選擇</span>
                      </div>`;
            }).join('');
          } else { list.innerHTML = "<p class='text-slate-500 text-center mt-10'>沒有檔案</p>"; }
        })
        .catch(function(err){ list.innerHTML = "<p class='text-red-500 text-center mt-10'>GAS 抓取失敗，請確認你的 GAS 有發布為『所有人皆可存取』，並且是用純文字輸出 JSON。</p>"; });
    }

    function autoFill(name, url) { document.getElementById('title').value = name; document.getElementById('url').value = url; }

    function bindFile() {
      var subject = document.getElementById('subject').value;
      var title = document.getElementById('title').value.trim();
      var url = document.getElementById('url').value.trim();
      var btn = document.getElementById('submitBtn');

      if(!title || !url) return alert('請先選擇檔案');
      btn.innerText = '上傳中...'; btn.disabled = true;

      fetch('/api/bind-answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: currentType, subject: subject, title: title, url: url })
      })
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(data.success) { alert('✅ 上傳成功！'); document.getElementById('title').value = ''; document.getElementById('url').value = ''; }
        else { alert('失敗：' + data.message); }
      })
      .catch(function(err){ alert('網路錯誤'); })
      .finally(function(){ btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 確認上傳'; btn.disabled = false; });
    }

    // 🏆 神級功能：取得 LINE Rich Menu ID
    function fetchLineMenus() {
      alert("正在呼叫 LINE API...");
      fetch('/api/get-menus')
        .then(function(res){ return res.json(); })
        .then(function(data){
          if(data.success) {
            var msg = "【您的選單清單】\n\n";
            data.menus.forEach(function(m) { msg += m.name + " :\n" + m.richMenuId + "\n\n"; });
            prompt("請複製您需要的 ID 到 Vercel 設定：", msg);
          } else { alert("獲取失敗：" + data.message); }
        })
        .catch(function(){ alert("連線錯誤"); });
    }

    window.onload = function() { if(!GAS_URL.includes("你的")) fetchGasFiles(); };
  </script>
</body>
</html>
