<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Education | 中樞控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 質感溫潤的 Japandi 風格底色與玻璃擬態 */
    body { 
      background-color: #F4F4F0; 
      background-image: radial-gradient(at 80% 0%, hsla(210, 100%, 95%, 1) 0px, transparent 50%),
                        radial-gradient(at 0% 100%, hsla(260, 100%, 95%, 1) 0px, transparent 50%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #2C2C2C;
    }
    .glass-panel { 
      background: rgba(255, 255, 255, 0.65); 
      backdrop-filter: blur(24px); 
      -webkit-backdrop-filter: blur(24px); 
      border: 1px solid rgba(255, 255, 255, 0.8); 
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 1);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.03);
    }
    .tab-btn.active {
      background-color: #1A1A1A;
      color: #FFFFFF;
      box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.2);
    }
    .type-btn.active { background: #1A1A1A; color: white; border-color: #1A1A1A; }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 20px; }
    ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-7xl mx-auto glass-panel rounded-[40px] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.05)] overflow-hidden">
    
    <header class="p-6 md:px-10 md:py-8 border-b border-white/50 flex flex-col md:flex-row justify-between items-center gap-6">
      <div>
        <h1 class="text-3xl font-black tracking-tight flex items-center gap-3">
          <span class="bg-white p-2 rounded-2xl shadow-sm">⚙️</span> Smart Education 中樞
        </h1>
        <p class="text-slate-500 text-sm font-medium mt-2 ml-1">極簡管理通道 | 資源綁定・學生建檔・軌跡分析</p>
      </div>
      
      <div class="flex bg-white/50 p-1.5 rounded-[20px] border border-white shadow-sm overflow-x-auto max-w-full">
        <button onclick="switchTab('tab-resource')" id="btn-resource" class="tab-btn active px-6 py-3 rounded-2xl text-sm font-bold text-slate-600 transition-all flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-folder-open"></i> 資源庫管理
        </button>
        <button onclick="switchTab('tab-student')" id="btn-student" class="tab-btn px-6 py-3 rounded-2xl text-sm font-bold text-slate-600 transition-all flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-user-plus"></i> 學生建檔
        </button>
        <button onclick="switchTab('tab-logs')" id="btn-logs" class="tab-btn px-6 py-3 rounded-2xl text-sm font-bold text-slate-600 transition-all flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-chart-pie"></i> 軌跡紀錄
        </button>
      </div>
    </header>

    <main class="p-6 md:p-10 min-h-[650px]">
      
      <div id="tab-resource" class="block space-y-8 animate-[fadeIn_0.3s_ease-out]">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
          
          <div class="lg:col-span-5 flex flex-col h-full">
            <div class="glass-card rounded-[32px] p-8 flex-1 flex flex-col">
              <div class="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                <h2 class="text-lg font-black flex items-center gap-2">
                  <i class="fa-brand fa-google-drive text-[#4285F4]"></i> 雲端待綁定區
                </h2>
                <button onclick="fetchGasFiles()" class="text-xs bg-slate-50 hover:bg-slate-100 text-slate-700 px-4 py-2 rounded-xl font-bold border border-slate-200 transition-colors">
                  <i class="fa-solid fa-rotate-right mr-1"></i> 重新掃描
                </button>
              </div>
              <div id="gasList" class="space-y-3 overflow-y-auto pr-2 max-h-[500px] min-h-[400px] flex-1">
                <p class="text-slate-400 text-center mt-20 text-sm font-medium"><i class="fa-solid fa-spinner fa-spin mr-2"></i>等候讀取中...</p>
              </div>
            </div>
          </div>

          <div class="lg:col-span-7 flex flex-col gap-6">
            <div class="glass-card rounded-[32px] p-8">
              <h2 class="text-lg font-black mb-6 flex items-center gap-2">
                <i class="fa-solid fa-link text-[#06C755]"></i> 新增資源發佈
              </h2>
              
              <div class="flex gap-4 mb-6">
                <button id="btn-answers" onclick="setDataType('answers')" class="type-btn active flex-1 py-4 border border-slate-200 rounded-[20px] font-bold text-sm transition-colors">
                  📝 解答專區
                </button>
                <button id="btn-textbooks" onclick="setDataType('textbooks')" class="type-btn flex-1 py-4 border border-slate-200 text-slate-500 rounded-[20px] font-bold text-sm transition-colors">
                  📚 電子課本
                </button>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                  <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-widest">歸屬科目</label>
                  <input type="text" id="subject" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:border-slate-300 focus:bg-white font-bold text-sm transition-all" placeholder="例如：國文、歷史">
                </div>
                <div>
                  <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-widest">按鈕標題</label>
                  <input type="text" id="title" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:border-slate-300 focus:bg-white font-bold text-sm transition-all" placeholder="選取檔案自動帶入">
                </div>
              </div>
              <div class="mb-6">
                <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-widest">檔案網址</label>
                <input type="url" id="url" readonly class="w-full p-4 rounded-2xl bg-slate-100/50 border border-slate-100 text-slate-400 text-xs font-mono outline-none" placeholder="選取檔案自動帶入">
              </div>
              
              <button id="submitBtn" onclick="bindFile()" class="w-full bg-[#1A1A1A] hover:bg-[#2C2C2C] text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-[0.98]">
                確認同步發佈
              </button>
            </div>

            <div class="bg-red-50/50 rounded-[32px] p-8 border border-red-100/50">
              <h2 class="text-lg font-black text-red-800 mb-5 flex items-center gap-2">
                <i class="fa-solid fa-trash-can"></i> 安全下架管理
              </h2>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <select id="delType" onchange="renderDelSelects()" class="p-4 rounded-2xl border border-red-100 font-bold text-sm bg-white text-red-900 outline-none focus:border-red-300">
                  <option value="answers">📝 解答庫</option>
                  <option value="textbooks">📚 課本庫</option>
                </select>
                <select id="delSubject" onchange="onSubjChange()" class="p-4 rounded-2xl border border-red-100 font-bold text-sm bg-white text-red-900 outline-none focus:border-red-300">
                  <option value="">選擇科目...</option>
                </select>
              </div>
              <select id="delItem" class="w-full p-4 rounded-2xl border border-red-100 font-bold text-sm bg-white text-red-900 mb-5 outline-none focus:border-red-300">
                <option value="">選擇單一檔案 (留空則刪除整科)</option>
              </select>
              <button onclick="executeDelete()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-600/20 transition-all active:scale-[0.98]">
                執行安全下架
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-student" class="hidden space-y-8 animate-[fadeIn_0.3s_ease-out]">
        <div class="glass-card rounded-[32px] p-8">
          <h2 class="text-lg font-black mb-6 flex items-center gap-2">
            <i class="fa-solid fa-user-plus text-blue-500"></i> 新增學生預建檔
          </h2>
          <div class="flex flex-col md:flex-row gap-5 items-end">
            <div class="flex-1 w-full">
              <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-widest">學號 / 座號代碼</label>
              <input type="text" id="newSeat" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:border-blue-300 focus:bg-white font-bold font-mono text-sm transition-all" placeholder="例如: 30125">
            </div>
            <div class="flex-1 w-full">
              <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-widest">學生真實姓名</label>
              <input type="text" id="newName" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:border-blue-300 focus:bg-white font-bold text-sm transition-all" placeholder="請輸入姓名">
            </div>
            <button id="addStudentBtn" onclick="addStudent()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold px-10 py-4 rounded-2xl shadow-lg shadow-blue-600/20 transition-all active:scale-[0.98]">
              確認建檔
            </button>
          </div>
        </div>

        <div class="glass-card rounded-[32px] p-8 overflow-hidden">
          <h2 class="text-lg font-black mb-6 flex items-center gap-2">
            <i class="fa-solid fa-address-book text-slate-600"></i> 學生認證清單
          </h2>
          <div class="overflow-x-auto rounded-[24px] border border-slate-100">
            <table class="w-full text-left">
              <thead class="bg-slate-50/80 border-b border-slate-100">
                <tr>
                  <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-wider">座號</th>
                  <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-wider">姓名</th>
                  <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-wider">認證狀態</th>
                  <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">操作</th>
                </tr>
              </thead>
              <tbody id="studentListContainer" class="text-sm divide-y divide-slate-50">
                <tr><td colspan="4" class="p-10 text-center text-slate-400 font-medium">資料載入中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="tab-logs" class="hidden space-y-4 animate-[fadeIn_0.3s_ease-out]">
        <div class="glass-card rounded-[32px] p-8">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-5 mb-8 pb-6 border-b border-slate-100">
            <div>
              <h2 class="text-lg font-black flex items-center gap-2">
                <i class="fa-solid fa-fingerprint text-indigo-500"></i> 數位足跡查詢
              </h2>
              <p class="text-xs text-slate-400 font-medium mt-1.5">即時追蹤全班解答與課本開啟紀錄</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
              <select id="logFilter" onchange="renderLogs()" class="p-3 rounded-xl border border-slate-200 font-bold text-sm bg-slate-50 outline-none focus:border-indigo-300 min-w-[200px]">
                <option value="all">📊 檢視全班總紀錄</option>
              </select>
              <button onclick="loadLogs()" class="bg-[#1A1A1A] hover:bg-[#2C2C2C] text-white px-6 py-3 rounded-xl text-sm font-bold shadow-md transition-all active:scale-[0.98]">
                刷新日誌
              </button>
            </div>
          </div>
          
          <div class="overflow-x-auto rounded-[24px] border border-slate-100">
            <table class="w-full text-left">
              <thead class="bg-slate-50/80 border-b border-slate-100 text-xs text-slate-400 font-bold uppercase tracking-wider">
                <tr>
                  <th class="p-5">時間</th>
                  <th class="p-5">座號 / 姓名</th>
                  <th class="p-5">類型</th>
                  <th class="p-5">科目單元內容</th>
                </tr>
              </thead>
              <tbody id="logsContainer" class="text-sm divide-y divide-slate-50">
                <tr><td colspan="4" class="p-10 text-center text-slate-400 font-medium">請點擊上方按鈕刷新日誌</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script>
    // =================================================================
    // ⚠️ 老哥，把你的 GAS 網址貼在下面這行引號裡面！
    // =================================================================
    var GAS_URL = "https://script.google.com/macros/s/AKfycbxB_QrqsHTpyVjihAevLxkfNEMKqpL45WZ1o0veow5IbTMr5bpoFqMdGLdvkPPdqrfw8Q/exec"; 

    var currentDataType = 'answers';
    var boundUrls = new Set();
    var fbData = { answers: {}, textbooks: {} };
    var allLogs = [];

    // --- UI 切換邏輯 ---
    function switchTab(tabId) {
      document.getElementById('tab-resource').classList.add('hidden');
      document.getElementById('tab-student').classList.add('hidden');
      document.getElementById('tab-logs').classList.add('hidden');
      document.getElementById('btn-resource').classList.remove('active');
      document.getElementById('btn-student').classList.remove('active');
      document.getElementById('btn-logs').classList.remove('active');
      
      document.getElementById(tabId).classList.remove('hidden');
      document.getElementById('btn-' + tabId.replace('tab-', '')).classList.add('active');
      
      if (tabId === 'tab-resource') fetchGasFiles();
      if (tabId === 'tab-student') loadStudents();
      if (tabId === 'tab-logs') loadLogs();
    }

    function setDataType(type) {
      currentDataType = type;
      document.getElementById('btn-answers').className = 'type-btn flex-1 py-4 border border-slate-200 rounded-[20px] font-bold text-sm transition-colors ' + (type === 'answers' ? 'active' : 'text-slate-500');
      document.getElementById('btn-textbooks').className = 'type-btn flex-1 py-4 border border-slate-200 rounded-[20px] font-bold text-sm transition-colors ' + (type === 'textbooks' ? 'active' : 'text-slate-500');
    }

    // --- 資源管理引擎 ---
    function loadBoundData() {
      return fetch('/api/admin-answers?action=list')
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            fbData = data; 
            boundUrls.clear();
            ['answers', 'textbooks'].forEach(t => { 
              for(var s in data[t]) {
                for(var k in data[t][s]) {
                  if(data[t][s][k].url) boundUrls.add(data[t][s][k].url);
                }
              }
            });
            renderDelSelects();
          }
        });
    }

    function fetchGasFiles() {
      var list = document.getElementById('gasList');
      if (!GAS_URL) { 
        list.innerHTML = "<div class='text-center mt-10 p-6 bg-red-50 rounded-2xl border border-red-100'><p class='text-red-600 font-bold'>請先於程式碼設定 GAS_URL</p></div>"; 
        return; 
      }
      list.innerHTML = "<p class='text-slate-500 text-center mt-20 text-sm font-bold'><i class='fa-solid fa-circle-notch fa-spin mr-2'></i>雲端掃描中...</p>";
      
      loadBoundData().then(() => fetch(GAS_URL))
      .then(res => res.json())
      .then(data => {
        if(data.error) throw new Error(data.error);
        var html = '';
        data.forEach(f => {
          if (!boundUrls.has(f.url)) {
            html += `<div class="p-4 bg-slate-50 hover:bg-slate-100 rounded-2xl mb-3 cursor-pointer border border-slate-100 flex justify-between items-center group transition-colors" onclick="autoFill('${f.name}','${f.url}')">
              <span class="text-sm font-bold text-slate-700 truncate pr-4 group-hover:text-slate-900"><i class="fa-solid fa-file-pdf text-red-500 mr-2 opacity-70"></i>${f.name}</span>
              <span class="text-[10px] bg-white border border-slate-200 group-hover:bg-[#1A1A1A] group-hover:text-white group-hover:border-[#1A1A1A] text-slate-500 px-3 py-1.5 rounded-lg font-black transition-all">帶入</span>
            </div>`;
          }
        });
        list.innerHTML = html || "<div class='text-center mt-16 p-8 bg-[#F4F4F0] rounded-3xl border border-slate-200'><p class='text-slate-700 font-bold'>🎉 雲端檔案皆已綁定</p></div>";
      }).catch(err => { 
        list.innerHTML = `<div class='text-center mt-10 p-6 bg-red-50 rounded-2xl border border-red-100'><p class='text-red-600 font-bold'>讀取失敗，請確認 GAS 權限</p></div>`; 
      });
    }

    function autoFill(n, u) { 
      document.getElementById('title').value = n; 
      document.getElementById('url').value = u; 
    }

    function bindFile() {
      var s = document.getElementById('subject').value.trim();
      var t = document.getElementById('title').value.trim();
      var u = document.getElementById('url').value.trim();
      var btn = document.getElementById('submitBtn');

      if (!s || !t || !u) return alert('⚠️ 請完整選擇檔案並填寫科目');

      btn.innerText = '同步寫入中...'; btn.disabled = true;

      fetch('/api/bind-answer', { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ type: currentDataType, subject: s, title: t, url: u }) 
      })
      .then(res => res.json())
      .then(data => { 
        if (data.success) { 
          alert('✅ 資源發佈成功！'); 
          document.getElementById('title').value = '';
          document.getElementById('url').value = '';
          fetchGasFiles(); 
        } else {
          alert('❌ 發生錯誤：' + data.message);
        }
      })
      .catch(() => alert('網路寫入失敗'))
      .finally(() => { btn.innerText = '確認同步發佈'; btn.disabled = false; });
    }

    function renderDelSelects() {
      var t = document.getElementById('delType').value;
      var sSelect = document.getElementById('delSubject');
      sSelect.innerHTML = '<option value="">選擇科目...</option>';
      for (var s in fbData[t]) sSelect.innerHTML += `<option value="${s}">${s}</option>`;
    }

    function onSubjChange() {
      var t = document.getElementById('delType').value;
      var s = document.getElementById('delSubject').value;
      var iSelect = document.getElementById('delItem');
      iSelect.innerHTML = '<option value="">單一檔案 (留空則刪除整科)</option>';
      if (!s) return;
      for (var k in fbData[t][s]) if (fbData[t][s][k].title) iSelect.innerHTML += `<option value="${k}">${fbData[t][s][k].title}</option>`;
    }

    function executeDelete() {
      var t = document.getElementById('delType').value;
      var s = document.getElementById('delSubject').value;
      var k = document.getElementById('delItem').value;
      if (!s) return alert('請先選擇科目！');
      if (!confirm('⚠️ 刪除操作無法復原，確定執行？')) return;
      
      fetch('/api/admin-answers', { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ action: 'delete', type: t, subject: s, key: k }) 
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) { alert('🗑️ 已成功刪除'); fetchGasFiles(); }
      });
    }

    // --- 學生建檔引擎 ---
    function loadStudents() {
      var container = document.getElementById('studentListContainer');
      container.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400 font-medium"><i class="fa-solid fa-spinner fa-spin mr-2"></i>讀取中...</td></tr>';
      
      fetch('/api/admin-students?action=list')
      .then(res => res.json())
      .then(data => {
        if (!data.success) return;
        var html = '';
        var count = 0;
        for (var seat in data.students) {
          count++;
          var stu = data.students[seat], isB = !!stu.lineId;
          
          var badge = isB 
            ? '<span class="bg-emerald-50 border border-emerald-200 text-emerald-700 px-3 py-1 rounded-lg font-black text-xs">已綁定</span>' 
            : '<span class="bg-slate-100 text-slate-400 px-3 py-1 rounded-lg font-bold text-xs">未認證</span>';
            
          var btn = isB 
            ? `<button onclick="unbindStudent('${seat}', '${stu.lineId}')" class="text-red-500 bg-white hover:bg-red-50 border border-slate-100 hover:border-red-100 px-3 py-1.5 rounded-xl text-xs font-bold transition-colors">解除綁定</button>` 
            : '';

          html += `<tr class="hover:bg-slate-50 transition-colors">
            <td class="p-5 font-bold font-mono text-slate-600">${seat}</td>
            <td class="p-5 font-black text-slate-800">${stu.name}</td>
            <td class="p-5">${badge}</td>
            <td class="p-5 text-right">${btn}</td>
          </tr>`;
        }
        container.innerHTML = count > 0 ? html : '<tr><td colspan="4" class="p-10 text-center text-slate-400 font-medium">目前名單空白，請於上方新增</td></tr>';
      });
    }

    // 🌟 核心修復：嚴謹的建檔防呆與回饋邏輯
    function addStudent() {
      var seatInput = document.getElementById('newSeat');
      var nameInput = document.getElementById('newName');
      var btn = document.getElementById('addStudentBtn');

      var s = seatInput.value.trim();
      var n = nameInput.value.trim();

      if (!s || !n) {
        alert('⚠️ 請完整填寫學座號與姓名！');
        return;
      }

      btn.innerText = '寫入中...';
      btn.disabled = true;

      fetch('/api/admin-students', { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ action: 'add', seat: s, name: n }) 
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          alert('✅ 學生建檔成功！');
          seatInput.value = '';
          nameInput.value = '';
          loadStudents();
        } else {
          alert('❌ 建檔失敗：' + (data.message || '未知錯誤'));
        }
      })
      .catch(err => alert('連線異常，請檢查 API'))
      .finally(() => {
        btn.innerText = '確認建檔';
        btn.disabled = false;
      });
    }

    function unbindStudent(s, l) {
      if (!confirm(`⚠️ 確定要解除座號【${s}】的 LINE 綁定嗎？`)) return;
      fetch('/api/admin-students', { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ action: 'unbind', seat: s, lineId: l }) 
      })
      .then(res => res.json())
      .then(data => { if (data.success) loadStudents(); });
    }

    // --- 軌跡紀錄引擎 ---
    function loadLogs() {
      var container = document.getElementById('logsContainer');
      container.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400 font-medium"><i class="fa-solid fa-spinner fa-spin mr-2"></i>分析日誌中...</td></tr>';
      
      fetch('/api/admin-logs').then(res => res.json()).then(data => {
        if(data.success) {
          allLogs = data.logs;
          var filter = document.getElementById('logFilter'), uniqueS = new Set();
          allLogs.forEach(l => uniqueS.add(l.seat));
          
          var html = '<option value="all">📊 檢視全班總紀錄</option>';
          Array.from(uniqueS).sort().forEach(s => html += `<option value="${s}">${s}</option>`);
          
          var currentVal = filter.value;
          filter.innerHTML = html;
          if(uniqueS.has(currentVal)) filter.value = currentVal;
          
          renderLogs();
        } else {
          container.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-400">讀取失敗</td></tr>';
        }
      }).catch(() => {
        container.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-400">連線異常</td></tr>';
      });
    }

    function renderLogs() {
      var filter = document.getElementById('logFilter').value;
      var container = document.getElementById('logsContainer'), html = '';
      var filtered = filter === 'all' ? allLogs : allLogs.filter(l => l.seat === filter);
      
      if(filtered.length > 0) {
        filtered.forEach(l => {
          var typeBadge = l.type === '解答' 
            ? '<span class="bg-[#FFE5E5] text-[#D93025] px-2.5 py-1.5 rounded-lg font-black text-[11px]">📝 查解答</span>' 
            : '<span class="bg-[#E8F0FE] text-[#1967D2] px-2.5 py-1.5 rounded-lg font-black text-[11px]">📚 看課本</span>';

          html += `<tr class="hover:bg-slate-50 transition-colors">
            <td class="p-5 text-xs text-slate-400 font-mono font-medium">${l.time}</td>
            <td class="p-5 font-bold text-slate-700">${l.seat} <span class="text-slate-400 text-xs ml-1">${l.name !== '未知' ? l.name : ''}</span></td>
            <td class="p-5">${typeBadge}</td>
            <td class="p-5 font-black text-slate-900">${l.subject}</td>
          </tr>`;
        });
        container.innerHTML = html;
      } else {
        container.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400 font-medium">尚無查詢紀錄</td></tr>';
      }
    }

    // 啟動初始化
    window.onload = () => switchTab('tab-resource');
  </script>
</body>
</html>
