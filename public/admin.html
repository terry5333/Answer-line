<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TerryEdu Admin Dashboard</title>
    <style>
        :root { --bg: #eef2f7; --glass: rgba(255, 255, 255, 0.4); }
        body { background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%); display: flex; min-height: 100vh; margin: 0; }
        .sidebar { width: 260px; background: rgba(255,255,255,0.2); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.3); padding: 40px 20px; }
        .main { flex: 1; padding: 40px; }
        .section { display: none; background: var(--glass); backdrop-filter: blur(20px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.5); }
        .active { display: block; }
        .nav-btn { padding: 15px; cursor: pointer; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
        .nav-btn:hover { background: rgba(255,255,255,0.4); }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: rgba(255,255,255,0.6); padding: 20px; border-radius: 15px; text-align: center; }
        .num { font-size: 40px; font-weight: 800; color: #4a90e2; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="margin-bottom:40px;">系統管理</h2>
        <div class="nav-btn" onclick="tab('ans')">📁 解答管理</div>
        <div class="nav-btn" onclick="tab('stu')">🧑‍🎓 學生管理</div>
        <div class="nav-btn" onclick="tab('rep')">📊 報表分析</div>
    </div>
    <div class="main">
        <div id="ans" class="section active">
            <h2>解答管理 (GAS 雲端同步)</h2>
            <button onclick="syncGas()">同步 Google Drive 檔案</button>
            <div id="gasList" style="margin-top:20px;"></div>
        </div>
        <div id="stu" class="section">
            <h2>學生管理</h2>
            <input type="text" id="sNo" placeholder="座號"> <input type="text" id="sName" placeholder="姓名">
            <button onclick="saveStu()">新增學生</button>
            <table id="stuList" style="width:100%; margin-top:20px;"></table>
        </div>
        <div id="rep" class="section">
            <h2>數據報表</h2>
            <div class="card-grid">
                <div class="stat-card"><div class="num" id="r1">0</div>建檔學生</div>
                <div class="stat-card"><div class="num" id="r2">85%</div>綁定率</div>
                <div class="stat-card"><div class="num" id="r3">12</div>今日點擊</div>
            </div>
        </div>
    </div>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbygibovMu_M60vb67idUpFTibjBGSQknsm6XOyx-_wY7WXZGfDMeKuopLjfdysVEAuS/exec";
        function tab(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        async function syncGas() {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            document.getElementById('gasList').innerHTML = data.files.map(f => `<div>${f.name} - <a href="${f.url}" target="_blank">預覽</a></div>`).join('');
        }
        async function saveStu() {
            const stuNo = document.getElementById('sNo').value;
            const name = document.getElementById('sName').value;
            await fetch('/api/students', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({stuNo, name}) });
            alert("已存入 Firebase");
        }
    </script>
</body>
</html>
