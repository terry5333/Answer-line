<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartEdu | 系統診斷中</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  
  <style>
    body { background-color: #FAF8F4; color: #1A1209; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid #EDE8E0; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); width: 100%; max-width: 400px; padding: 40px; text-align: center; z-index: 10;}
  </style>
</head>
<body>

  <div class="glass-card">
    <h1 class="text-2xl font-bold mb-6">SmartEdu 管理員登入</h1>
    
    <button onclick="signInWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-black text-white font-bold py-4 rounded-xl transition-all active:scale-95 mb-4">
      點擊測試 Google 登入
    </button>

    <div id="debugBox" class="bg-gray-900 text-green-400 text-left text-xs font-mono p-4 rounded-xl h-48 overflow-y-auto break-words shadow-inner">
      [系統] 終端機啟動中...<br>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    // ⚠️ 替換成你的信箱
    const ADMIN_WHITELIST = ['terrylie0215@gmail.com']; 
    let auth;
    let provider;

    // 自訂除錯輸出函數
    function log(msg, isError = false) {
      const box = document.getElementById('debugBox');
      const time = new Date().toLocaleTimeString();
      const color = isError ? 'text-red-400' : 'text-green-400';
      box.innerHTML += `<span class="${color}">[${time}] ${msg}</span><br>`;
      box.scrollTop = box.scrollHeight;
      console.log(`[${time}] ${msg}`);
    }

    // 1. 抓取 Vercel 設定檔
    log("開始向 Vercel 請求 /api/config...");
    fetch('/api/config')
      .then(res => {
        log(`API 回應狀態碼: ${res.status}`);
        if (!res.ok) throw new Error('API 讀取失敗，請確認 Vercel 部署。');
        return res.json();
      })
      .then(config => {
        log(`成功取得 Config！API_KEY 長度: ${config.apiKey ? config.apiKey.length : '空值'}`);
        
        if (!config.apiKey) {
          log("❌ 致命錯誤：抓到的 apiKey 是空的！請檢查 Vercel 環境變數是否正確填寫並重新 Deploy。", true);
          return;
        }

        // 2. 初始化 Firebase
        if (!firebase.apps.length) firebase.initializeApp(config);
        auth = firebase.auth();
        provider = new firebase.auth.GoogleAuthProvider();
        log("Firebase Auth 初始化成功。");

        // 3. 檢查跳轉回來的結果
        log("正在檢查是否有跳轉回傳的登入憑證...");
        auth.getRedirectResult().then(function(result) {
          if (result && result.user) {
            log(`✅ 成功捕獲帳號: ${result.user.email}`);
            if (ADMIN_WHITELIST.includes(result.user.email)) {
              log("白名單吻合，準備跳轉至 /admin.html...");
              setTimeout(() => { window.location.href = '/admin.html'; }, 1000);
            } else {
              log(`❌ 帳號未授權，執行登出。`, true);
              auth.signOut();
            }
          } else {
            log("目前無跳轉憑證，等待使用者點擊登入。");
          }
        }).catch(function(err) {
          log(`❌ getRedirectResult 錯誤: ${err.message}`, true);
        });

      })
      .catch(err => {
        log(`❌ 系統錯誤: ${err.message}`, true);
      });

    // 4. 按鈕點擊事件
    function signInWithGoogle() { 
      log("👉 [按鈕被點擊] 開始執行登入程序...");
      if (!auth) {
        log("❌ auth 尚未準備好，無法執行！", true);
        return;
      }
      
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      log(`偵測到瀏覽器環境: ${navigator.userAgent.substring(0, 50)}...`);
      
      if (ua.indexOf("Line") > -1 || ua.indexOf("FBAN") > -1 || ua.indexOf("FBAV") > -1) {
        log("❌ 偵測到 LINE / FB 內建瀏覽器，這會阻擋登入！", true);
        alert("⚠️ 系統偵測：您正在使用 LINE 內建瀏覽器。\nGoogle 官方禁止在此環境登入，請點擊右上角「以 Safari/Chrome 開啟」！");
        return;
      }

      log("🚀 呼叫 signInWithRedirect，準備跳轉至 Google...");
      try {
        auth.signInWithRedirect(provider).catch(err => {
          log(`❌ 跳轉被阻擋或失敗: ${err.message}`, true);
        });
      } catch (e) {
        log(`❌ 執行跳轉時發生崩潰: ${e.message}`, true);
      }
    }
  </script>
</body>
</html>
