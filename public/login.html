<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartEdu | 管理員登入</title>
  
  <link rel="manifest" href="/manifest.json?v=2">
  <meta name="theme-color" content="#FAF8F4">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Instrument Sans"', 'sans-serif'], serif: ['Fraunces', 'serif'] },
          colors: {
            bgCream: '#FAF8F4', textMain: '#1A1209', textMuted: '#8C7D6B',
            accentTerra: '#D4654A', terraBg: '#FDF0EC',
            accentSaffron: '#E8913A', accentSage: '#4A8B6F',
          }
        }
      }
    }
  </script>

  <style>
    body { background-color: #FAF8F4; color: #1A1209; min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .glass-card { background: rgba(255, 253, 249, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(237, 232, 224, 0.8); border-radius: 20px; box-shadow: 0 8px 32px rgba(26, 18, 9, 0.03); }
    .glow-circle { position: absolute; border-radius: 50%; filter: blur(60px); z-index: -1; opacity: 0.6; pointer-events: none; }
    .glow-saffron { background: #F8D4A3; width: 300px; height: 300px; top: -50px; left: -50px; }
    .glow-sage { background: #B3D8C6; width: 400px; height: 400px; bottom: -100px; right: -50px; }
    .fade-up { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="relative font-sans antialiased">

  <div class="glow-circle glow-saffron"></div>
  <div class="glow-circle glow-sage fixed"></div>

  <div class="glass-card p-10 max-w-md w-full mx-4 text-center fade-up relative z-10">
    <div class="w-16 h-16 bg-terraBg rounded-[20px] flex items-center justify-center mx-auto mb-6">
      <i data-lucide="shield-check" class="w-8 h-8 text-accentTerra"></i>
    </div>
    <h1 class="font-serif italic text-3xl mb-2 text-textMain">SmartEdu</h1>
    <p class="text-textMuted tracking-wide text-sm uppercase mb-8">Admin Portal Access</p>
    
    <button onclick="signInWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-[#EDE8E0] hover:bg-gray-50 text-textMain font-bold py-4 rounded-[16px] shadow-sm transition-all hover:-translate-y-0.5">
      <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 管理員登入
    </button>
  </div>

  <script>
    lucide.createIcons();
    let auth;
    let provider;

    // 🏆 請填寫您的管理員信箱
    const ADMIN_WHITELIST = ['terrylie0215@gmail.com'];

    // 網頁載入瞬間，直接向 Vercel 請求金鑰
    fetch('/api/config')
      .then(res => {
        if (!res.ok) throw new Error('API 讀取失敗');
        return res.json();
      })
      .then(config => {
        if (!firebase.apps.length) firebase.initializeApp(config);
        auth = firebase.auth();
        provider = new firebase.auth.GoogleAuthProvider();

        // 監聽是否已經處於登入狀態
        auth.onAuthStateChanged(function(user) {
          if (user && ADMIN_WHITELIST.includes(user.email)) {
            window.location.href = '/admin.html';
          }
        });
      })
      .catch(err => {
        console.error(err);
        alert("系統環境變數載入失敗，請確認 Vercel 的 /api/config 部署狀態！");
      });

    // 🏆 終極登入函數：回歸 Popup，避開跨站追蹤封鎖
    function signInWithGoogle() { 
      if (!auth) return alert('系統初始化中，請稍候...');
      
      // 防禦 LINE / FB 內建瀏覽器
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      if (ua.indexOf("Line") > -1 || ua.indexOf("FBAN") > -1) {
        alert("⚠️ 系統偵測：您正在使用社群軟體內建瀏覽器！\nGoogle 官方禁止在此環境登入，請點擊右上角「以 Safari/Chrome 開啟」以繼續。");
        return;
      }

      // 呼叫同步彈出視窗
      auth.signInWithPopup(provider)
        .then(function(result) {
          if (ADMIN_WHITELIST.includes(result.user.email)) {
            window.location.href = '/admin.html';
          } else {
            alert(`⚠️ 存取遭拒！\n帳號 [${result.user.email}] 未授權。`);
            auth.signOut();
          }
        })
        .catch(function(err) {
          // 精準攔截彈出視窗被擋的狀況
          if (err.code === 'auth/popup-blocked') {
            alert("⚠️ 瀏覽器阻擋了登入視窗！\n請允許彈出視窗，或不要在無痕模式下操作。");
          } else {
            alert("登入異常：" + err.message);
          }
        });
    }
  </script>
</body>
</html>
