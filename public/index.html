<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Binding</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-4">
  
  <div class="bg-white/70 backdrop-blur-xl border border-white shadow-xl rounded-3xl p-8 w-full max-w-sm text-center">
    
    <div id="step1">
      <h2 class="text-2xl font-extrabold text-slate-800 mb-2">學生座號綁定</h2>
      <p class="text-sm text-slate-500 mb-8">請輸入您的座號以完成身分驗證</p>
      
      <div class="text-left mb-6">
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">學生座號</label>
        <input type="text" id="stuNo" placeholder="例：01" class="w-full px-4 py-3 rounded-xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
      </div>
      
      <button id="nextBtn" onclick="nextStep()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl transition-all shadow-md">
        下一步：確認資訊 →
      </button>
    </div>

    <div id="step2" class="hidden">
      <h2 class="text-2xl font-extrabold text-slate-800 mb-6">確認學生身分</h2>
      <div id="dispSeat" class="inline-block bg-slate-100 text-slate-600 px-4 py-1.5 rounded-full text-sm font-semibold mb-6">座號 -- 號</div>
      
      <p class="text-sm text-slate-500">系統帶出的姓名</p>
      <h3 id="dispName" class="text-3xl font-black text-slate-900 mt-2 mb-8 tracking-widest">---</h3>
      
      <button id="bindBtn" onclick="executeBind()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-md mb-3">確認綁定</button>
      <button onclick="prevStep()" class="w-full bg-white hover:bg-slate-50 text-slate-600 font-bold py-3 rounded-xl border border-slate-200 transition-all">返回修改</button>
    </div>

  </div>

  <script>
    let userId = "";
    
    async function init() {
      // ⚠️ 填入你的 LIFF ID
      await liff.init({ liffId: "你的_LIFF_ID" });
      if (!liff.isLoggedIn()) liff.login();
      userId = (await liff.getProfile()).userId;
    }

    async function nextStep() {
      const stuNo = document.getElementById('stuNo').value.trim();
      if (!stuNo) return alert("請輸入座號");
      const btn = document.getElementById('nextBtn');
      btn.innerText = "查詢中..."; btn.disabled = true;

      try {
        const res = await fetch(`/api/students?stuNo=${stuNo}`);
        const data = await res.json();
        if (data.success) {
          document.getElementById('dispSeat').innerText = `座號 ${stuNo} 號`;
          document.getElementById('dispName').innerText = data.name;
          document.getElementById('step1').classList.add('hidden');
          document.getElementById('step2').classList.remove('hidden');
        } else alert("找不到該座號的學生資料");
      } catch(e) { alert("伺服器連線失敗"); }
      btn.innerText = "下一步：確認資訊 →"; btn.disabled = false;
    }

    async function executeBind() {
      const stuNo = document.getElementById('stuNo').value;
      const btn = document.getElementById('bindBtn');
      btn.innerText = "綁定中..."; btn.disabled = true;

      try {
        const res = await fetch('/api/bind', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId, stuNo }) });
        if ((await res.json()).success) { alert("✅ 綁定成功"); liff.closeWindow(); } 
        else { alert("綁定失敗"); btn.innerText = "確認綁定"; btn.disabled = false; }
      } catch(e) { alert("連線錯誤"); btn.innerText = "確認綁定"; btn.disabled = false; }
    }

    function prevStep() {
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');
    }
    init();
  </script>
</body>
</html>
