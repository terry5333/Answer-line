<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生系統綁定</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 24px; padding: 40px 30px; width: 90%; max-width: 400px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); text-align: center;
    }
    h2 { color: #fff; margin-bottom: 24px; font-weight: 600; letter-spacing: 1px; }
    input {
      width: 100%; padding: 16px; margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 12px; font-size: 16px; color: #333; outline: none; transition: 0.3s;
    }
    input::placeholder { color: #666; }
    input:focus { background: rgba(255, 255, 255, 0.8); box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.8); }
    button {
      width: 100%; padding: 16px; border: none; border-radius: 12px;
      background: #ffffff; color: #4a90e2; font-size: 18px; font-weight: bold;
      cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    button:active { transform: scale(0.98); }
    button:disabled { background: #ccc; color: #888; cursor: not-allowed; }
    #status { margin-top: 16px; color: #fff; font-size: 14px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="glass-card">
    <h2>系統帳號綁定</h2>
    <input type="text" id="stuNo" placeholder="請輸入學號 (例: 112001)" />
    <button id="bindBtn" onclick="bindAccount()" disabled>載入中...</button>
    <div id="status">正在初始化 LINE 驗證...</div>
  </div>

  <script>
    let userId = "";
    
    // 1. 初始化 LIFF
    async function main() {
      try {
        // 請將 YOUR_LIFF_ID 替換成你的真實 LIFF ID
        await liff.init({ liffId: "YOUR_LIFF_ID" });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        userId = profile.userId;
        
        document.getElementById('bindBtn').disabled = false;
        document.getElementById('bindBtn').innerText = "確認綁定";
        document.getElementById('status').innerText = "驗證完成，請輸入學號";
      } catch (err) {
        document.getElementById('status').innerText = "LIFF 初始化失敗";
      }
    }

    // 2. 點擊綁定按鈕
    async function bindAccount() {
      const stuNo = document.getElementById('stuNo').value.trim();
      const btn = document.getElementById('bindBtn');
      const status = document.getElementById('status');

      if (!stuNo) return status.innerText = "⚠️ 學號不能為空！";

      btn.disabled = true;
      btn.innerText = "綁定中...";
      status.innerText = "";

      try {
        // 呼叫我們的 Vercel API
        const response = await fetch('/api/bind', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, stuNo })
        });
        
        const result = await response.json();
        if (result.success) {
          status.innerText = "✅ 綁定成功！請關閉此視窗查看選單。";
          setTimeout(() => liff.closeWindow(), 2000);
        } else {
          status.innerText = "❌ 綁定失敗：" + result.message;
          btn.disabled = false;
          btn.innerText = "重新綁定";
        }
      } catch (err) {
        status.innerText = "❌ 網路連線錯誤";
        btn.disabled = false;
        btn.innerText = "重新綁定";
      }
    }

    main();
  </script>
</body>
</html>
