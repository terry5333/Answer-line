<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>極簡檔案綁定中樞</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      background: linear-gradient(135deg, #e2e8f0, #f8fafc); 
      min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; 
      font-family: sans-serif;
    }
    /* 玻璃擬態與大圓角 */
    .glass { 
      background: rgba(255, 255, 255, 0.6); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px); 
      border: 1px solid rgba(255, 255, 255, 0.8); 
      box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
      border-radius: 32px; 
    }
    .type-btn.active { background: #1e293b; color: white; border-color: #1e293b; }
  </style>
</head>
<body>

  <div class="glass w-full max-w-5xl p-10">
    <header class="mb-8 border-b border-slate-300/50 pb-4">
      <h1 class="text-3xl font-black text-slate-800">雲端檔案綁定</h1>
      <p class="text-slate-500 font-medium mt-1">從 Drive 讀取檔案，寫入 Firebase</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
      
      <div class="bg-white/40 rounded-3xl p-6 border border-white">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-bold text-slate-700">Google Drive 檔案</h2>
          <button onclick="fetchGasFiles()" class="text-xs bg-white text-blue-600 px-3 py-1.5 rounded-xl font-bold shadow-sm">重新掃描</button>
        </div>
        <div id="gasList" class="space-y-2 h-[350px] overflow-y-auto pr-2">
          <p class="text-slate-500 text-center mt-10">等候讀取中...</p>
        </div>
      </div>

      <div class="bg-white/60 rounded-3xl p-6 border border-white flex flex-col">
        
        <div class="flex gap-3 mb-6">
          <button id="btn-answers" onclick="setType('answers')" class="type-btn active flex-1 py-3 border border-slate-300 rounded-2xl font-bold transition">解答</button>
          <button id="btn-textbooks" onclick="setType('textbooks')" class="type-btn flex-1 py-3 border border-slate-300 text-slate-600 rounded-2xl font-bold transition">課本</button>
        </div>

        <div class="space-y-4 flex-1">
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">歸屬科目</label>
            <input type="text" id="subject" class="w-full p-4 rounded-2xl bg-white border border-slate-200 outline-none font-bold" placeholder="例如：國文、歷史">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">檔案標題</label>
            <input type="text" id="title" class="w-full p-4 rounded-2xl bg-white border border-slate-200 outline-none font-medium" placeholder="點擊左側檔案自動帶入">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">檔案網址</label>
            <input type="url" id="url" readonly class="w-full p-4 rounded-2xl bg-slate-100 border border-slate-200 text-slate-400 text-sm outline-none">
          </div>
        </div>

        <button id="submitBtn" onclick="bindFile()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-slate-800 transition mt-6">
          確認綁定
        </button>
      </div>

    </div>
  </div>

  <script>
    // ⚠️ 替換成你的 GAS 網址
    var GAS_URL = "https://script.google.com/macros/s/AKfycbxB_QrqsHTpyVjihAevLxkfNEMKqpL45WZ1o0veow5IbTMr5bpoFqMdGLdvkPPdqrfw8Q/exec";
    var currentType = 'answers';

    function setType(type) {
      currentType = type;
      document.getElementById('btn-answers').className = 'type-btn flex-1 py-3 border border-slate-300 rounded-2xl font-bold transition ' + (type === 'answers' ? 'active' : 'text-slate-600');
      document.getElementById('btn-textbooks').className = 'type-btn flex-1 py-3 border border-slate-300 rounded-2xl font-bold transition ' + (type === 'textbooks' ? 'active' : 'text-slate-600');
    }

    function fetchGasFiles() {
      var list = document.getElementById('gasList');
      if(GAS_URL.includes("YOUR_GAS")) { list.innerHTML = "<p class='text-red-500 text-center font-bold mt-10'>請先填寫 GAS 網址</p>"; return; }
      
      list.innerHTML = "<p class='text-blue-500 text-center font-bold mt-10'>掃描雲端硬碟中...</p>";
      
      fetch(GAS_URL)
        .then(function(res){ return res.json(); })
        .then(function(data){
          if(data && data.length > 0) {
            list.innerHTML = data.map(function(f){
              return `<div class="p-4 bg-white/80 rounded-2xl mb-2 cursor-pointer hover:bg-white shadow-sm transition flex justify-between items-center" onclick="autoFill('${f.name}','${f.url}')">
                        <span class="text-sm font-bold text-slate-700 truncate pr-4">${f.name}</span>
                        <span class="text-[10px] bg-slate-200 text-slate-600 px-2 py-1 rounded-lg font-bold">選取</span>
                      </div>`;
            }).join('');
          } else { list.innerHTML = "<p class='text-slate-500 text-center mt-10'>資料夾內沒有檔案</p>"; }
        })
        .catch(function(){ list.innerHTML = "<p class='text-red-500 text-center mt-10'>連線 GAS 失敗，請確認網址與存取權限</p>"; });
    }

    function autoFill(name, url) {
      document.getElementById('title').value = name;
      document.getElementById('url').value = url;
    }

    function bindFile() {
      var subject = document.getElementById('subject').value.trim();
      var title = document.getElementById('title').value.trim();
      var url = document.getElementById('url').value.trim();
      var btn = document.getElementById('submitBtn');

      if(!subject || !title || !url) return alert('請填寫歸屬科目，並從左側選擇檔案！');

      btn.innerText = '寫入資料庫中...'; 
      btn.disabled = true;

      fetch('/api/bind-answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: currentType, subject: subject, title: title, url: url })
      })
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(data.success) { 
          alert('✅ 綁定成功！'); 
          document.getElementById('title').value = ''; 
          document.getElementById('url').value = ''; 
        } else { 
          alert('錯誤：' + data.message); 
        }
      })
      .catch(function(){ alert('網路連線錯誤'); })
      .finally(function(){ 
        btn.innerText = '確認綁定'; 
        btn.disabled = false; 
      });
    }

    window.onload = function() { 
      if(!GAS_URL.includes("YOUR_GAS")) fetchGasFiles(); 
    };
  </script>
</body>
</html>
